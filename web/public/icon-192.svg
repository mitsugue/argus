<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="iris192" cx="96" cy="92" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00f3ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00f3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="192" height="192" fill="#000"/>

  <!-- Hexagonal frame -->
  <polygon points="96,12 165,52 165,132 96,172 27,132 27,52"
           fill="none" stroke="#00f3ff" stroke-width="2.2" opacity="0.85"/>

  <!-- Iris glow -->
  <circle cx="96" cy="92" r="42" fill="url(#iris192)"/>

  <!-- Main eye -->
  <circle cx="96" cy="92" r="40" fill="none" stroke="#00f3ff" stroke-width="2.6"/>
  <circle cx="96" cy="92" r="22" fill="none" stroke="#ffb700" stroke-width="1.8"/>
  <circle cx="96" cy="92" r="6"  fill="#00f3ff"/>

  <!-- Crosshair -->
  <line x1="96"  y1="18" x2="96"  y2="44" stroke="#00f3ff" stroke-width="1.2" opacity="0.55"/>
  <line x1="96"  y1="140" x2="96" y2="166" stroke="#00f3ff" stroke-width="1.2" opacity="0.55"/>
  <line x1="22"  y1="92" x2="48"  y2="92" stroke="#00f3ff" stroke-width="1.2" opacity="0.55"/>
  <line x1="144" y1="92" x2="170" y2="92" stroke="#00f3ff" stroke-width="1.2" opacity="0.55"/>

  <!-- Argus eyes — 8 dots around the main iris, alternating cyan / amber -->
  <g fill="#00f3ff">
    <circle cx="138.7" cy="49.3" r="3"/>
    <circle cx="53.3"  cy="49.3" r="3"/>
    <circle cx="138.7" cy="134.7" r="3"/>
    <circle cx="53.3"  cy="134.7" r="3"/>
  </g>
  <g fill="#ffb700">
    <circle cx="96"  cy="32" r="2.4"/>
    <circle cx="96"  cy="152" r="2.4"/>
    <circle cx="32"  cy="92" r="2.4"/>
    <circle cx="160" cy="92" r="2.4"/>
  </g>

  <!-- Wordmark (bold) -->
  <text x="96" y="186" text-anchor="middle"
        fill="#00f3ff" font-family="'JetBrains Mono', monospace"
        font-size="22" font-weight="800" letter-spacing="3"
        stroke="#00f3ff" stroke-width="0.4">A.R.G.U.S.</text>
</svg>
