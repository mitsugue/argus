<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="iris512" cx="256" cy="240" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#00f3ff" stop-opacity="0.25"/>
      <stop offset="0.6" stop-color="#00f3ff" stop-opacity="0.06"/>
      <stop offset="1"   stop-color="#00f3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pupil512" cx="256" cy="240" r="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6f5f7"/>
      <stop offset="0.5" stop-color="#00f3ff"/>
      <stop offset="1" stop-color="#00f3ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#000"/>

  <!-- Outer hex frame, double layer -->
  <polygon points="256,28 444,138 444,358 256,468 68,358 68,138"
           fill="none" stroke="#00f3ff" stroke-width="3" opacity="0.6"/>
  <polygon points="256,46 428,146 428,350 256,450 84,350 84,146"
           fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.35"/>

  <!-- Corner brackets on the hex -->
  <g stroke="#ffb700" stroke-width="2.5" fill="none">
    <path d="M68,138 L68,170 M68,138 L94,138"/>
    <path d="M444,138 L444,170 M444,138 L418,138"/>
    <path d="M68,358 L68,326 M68,358 L94,358"/>
    <path d="M444,358 L444,326 M444,358 L418,358"/>
  </g>

  <!-- Iris glow -->
  <circle cx="256" cy="240" r="120" fill="url(#iris512)"/>

  <!-- Main eye: outer iris, mid iris, amber inner, pupil -->
  <circle cx="256" cy="240" r="118" fill="none" stroke="#00f3ff" stroke-width="4"/>
  <circle cx="256" cy="240" r="90"  fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.45"/>
  <circle cx="256" cy="240" r="62"  fill="none" stroke="#ffb700" stroke-width="3"/>
  <circle cx="256" cy="240" r="38"  fill="none" stroke="#ffb700" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="240" r="18"  fill="url(#pupil512)"/>
  <circle cx="256" cy="240" r="6"   fill="#000"/>

  <!-- Crosshair through center -->
  <line x1="256" y1="60"  x2="256" y2="120" stroke="#00f3ff" stroke-width="2" opacity="0.55"/>
  <line x1="256" y1="360" x2="256" y2="420" stroke="#00f3ff" stroke-width="2" opacity="0.55"/>
  <line x1="76"  y1="240" x2="136" y2="240" stroke="#00f3ff" stroke-width="2" opacity="0.55"/>
  <line x1="376" y1="240" x2="436" y2="240" stroke="#00f3ff" stroke-width="2" opacity="0.55"/>

  <!-- 12 surrounding eyes — Argus Panoptes has many eyes -->
  <g fill="#00f3ff">
    <!-- 8 diagonal slots around the iris at r ~ 160 -->
    <circle cx="369"  cy="127"  r="6"/>
    <circle cx="143"  cy="127"  r="6"/>
    <circle cx="369"  cy="353"  r="6"/>
    <circle cx="143"  cy="353"  r="6"/>
    <circle cx="416"  cy="240"  r="5"/>
    <circle cx="96"   cy="240"  r="5"/>
  </g>
  <g fill="#ffb700">
    <circle cx="256" cy="84"  r="5"/>
    <circle cx="256" cy="396" r="5"/>
  </g>
  <!-- Smaller eyes between -->
  <g fill="#00f3ff" opacity="0.7">
    <circle cx="324" cy="100"  r="3"/>
    <circle cx="188" cy="100"  r="3"/>
    <circle cx="324" cy="380"  r="3"/>
    <circle cx="188" cy="380"  r="3"/>
  </g>

  <!-- Wordmark — Tesla-esque geometric futurist -->
  <text x="256" y="460" text-anchor="middle"
        fill="#00f3ff"
        font-family="Orbitron, Michroma, Eurostile, 'Arial Black', sans-serif"
        font-size="50" font-weight="900" letter-spacing="8"
        stroke="#00f3ff" stroke-width="0.8">A.R.G.U.S.</text>
  <text x="256" y="492" text-anchor="middle"
        fill="#ffb700"
        font-family="Orbitron, Michroma, sans-serif"
        font-size="11" font-weight="500" letter-spacing="5" opacity="0.85">AUTONOMOUS RISK · GLOBAL UNCERTAINTY · SCANNER</text>
</svg>
