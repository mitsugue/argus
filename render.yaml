services:
  - type: web
    name: argus-backend
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python scanner.py
    autoDeploy: true
    # Free plan disks are ephemeral. To persist the predictions ledger across
    # deploys + sleeps, attach a Render Disk (1 GB / $1 mo) and set:
    #   ARGUS_LEDGER_PATH=/var/data/predictions.jsonl
    # disk:
    #   name: argus-data
    #   mountPath: /var/data
    #   sizeGB: 1
    envVars:
      - key: PORT
        value: 8080
      - key: ARGUS_LEDGER_PATH
        value: data/predictions.jsonl
      # Provide your secrets via the Render dashboard, not in this file.
      # J-Quants V2 (live Japan watchlist): a single dashboard API key, sent
      # in the x-api-key header (v1 mailaddress/password is discontinued).
      - key: JQUANTS_API_KEY
        sync: false
      # FRED (live rates snapshot) — also dashboard-only.
      - key: FRED_API_KEY
        sync: false
      # Twelve Data (live US watchlist) — single dashboard API key, sent as the
      # apikey query param server-side.
      - key: TWELVEDATA_API_KEY
        sync: false
      # AI Judgment Layer v1 (optional second-opinion review). Backend-only.
      # Disabled unless AI_JUDGE_ENABLED is true. Admin token gates POST run.
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: GEMINI_JUDGE_MODEL
        sync: false
      - key: AI_JUDGE_ENABLED
        sync: false
      - key: AI_JUDGE_MAX_RUNS_PER_DAY
        sync: false
      - key: AI_JUDGE_MIN_INTERVAL_MINUTES
        sync: false
      - key: AI_JUDGE_CACHE_TTL_MINUTES
        sync: false
      - key: AI_JUDGE_LOCKED
        sync: false
      - key: AI_JUDGE_ALLOW_COUNTRIES
        sync: false
      - key: ARGUS_ADMIN_TOKEN
        sync: false
      - key: SECURITY_ALERT_EMAIL
        sync: false
      - key: SECURITY_ALERT_PROVIDER
        sync: false
      - key: SECURITY_ALERT_WEBHOOK
        sync: false
      # Corporate Catalyst Layer. SEC EDGAR needs a descriptive User-Agent with
      # a real contact email (SEC policy). TDnet add-on stays off until enabled.
      - key: SEC_USER_AGENT
        sync: false
      - key: JQUANTS_TDNET_ENABLED
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: X_API_BEARER_TOKEN
        sync: false
      - key: EDINET_API_KEY
        sync: false
