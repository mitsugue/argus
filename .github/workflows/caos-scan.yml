# C.A.O.S. (Corroborated Analyst & Official Signals) — institutional-intelligence
# source scan. Institutional/news chatter does NOT follow market hours, so this runs
# every 30 min AROUND THE CLOCK (incl. weekends), independent of market-watch. It
# POSTs the admin-gated /collect, which fetches the allow-listed public RSS/sitemap
# feeds (Bloomberg EN+JP, Nikkei, CNBC, MarketWatch, Nasdaq, Yahoo, Fed, SEC),
# normalizes + dedups + persists. All public RSS (no quota source), so 48 runs/day is
# safe. The public GET never fetches — this cron is the only collection path.
name: caos-scan

on:
  schedule:
    - cron: '*/30 * * * *'      # every 30 min, 24/7
  workflow_dispatch: {}

# v11.9.1: the news-ja snapshot step pushes to the ledger branch.
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Collect C.A.O.S. public sources
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          # success=2xx+valid JSON+business ok; expected_skip=missing secret;
          # degraded/failure=non-zero step (401/403/5xx/timeout/invalid JSON含む)。
          BE="https://argus-backend-3j2m.onrender.com"
          [ -z "$ARGUS_ADMIN_TOKEN" ] && { echo "no admin token — expected_skip"; exit 0; }
          curl -s --max-time 60 "$BE/healthz" > /dev/null || true   # warm dyno
          RESP=$(python3 scripts/workflow_http.py --name caos-collect --method POST --timeout 120 \
            --header-env X-ARGUS-ADMIN-TOKEN=ARGUS_ADMIN_TOKEN \
            --url "$BE/api/argus/institutional-intelligence/collect")
          echo "caos-collect: $RESP"
          # v12.1.0: OSINTスカウトのキュー消化(キューが空なら外部AIは呼ばれない=無料)
          OS=$(python3 scripts/workflow_http.py --name osint-agents --method POST --timeout 180 \
            --header-env X-ARGUS-ADMIN-TOKEN=ARGUS_ADMIN_TOKEN \
            --header 'Content-Type: application/json' --data '{}' \
            --url "$BE/api/argus/admin/osint/agents-run")
          echo "osint-agents: $OS"
          # v12.2.1: セッション対応ミッションtick(冪等・予測発行/成果解決/回収)
          MT=$(python3 scripts/workflow_http.py --name missions-tick --method POST --timeout 60 \
            --header-env X-ARGUS-ADMIN-TOKEN=ARGUS_ADMIN_TOKEN \
            --header 'Content-Type: application/json' --data '{}' \
            --url "$BE/api/argus/admin/missions/tick")
          echo "missions-tick: $MT"
          # v12.1.7: 基準校正の加速(run最少ケースを最大2件・Gemini 2呼び出し/回)
          BM=$(python3 scripts/workflow_http.py --name osint-benchmark --method POST --timeout 60 \
            --header-env X-ARGUS-ADMIN-TOKEN=ARGUS_ADMIN_TOKEN \
            --header 'Content-Type: application/json' --data '{}' \
            --url "$BE/api/argus/admin/osint/benchmark-run")
          echo "osint-benchmark: $BM"
          # v12.1.0: canary(見落とし監視・cached評価のみで外部AIなし)
          CN=$(python3 scripts/workflow_http.py --name osint-canary --method POST --timeout 60 \
            --header-env X-ARGUS-ADMIN-TOKEN=ARGUS_ADMIN_TOKEN \
            --header 'Content-Type: application/json' --data '{}' \
            --url "$BE/api/argus/admin/osint/canary-run")
          echo "osint-canary: $CN"

      # v11.9.1 (owner: 「ニュースが全部翻訳待ち」): the ONLY translate drain used
      # to live in caos-watchtower (weekdays only) — weekends never translated.
      # This scan runs 24/365, so the queue now drains here too, up to 4 rounds
      # per run (≈240 headlines) until nothing is pending.
      - name: Translate visible headlines (24/7 drain)
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          [ -z "$ARGUS_ADMIN_TOKEN" ] && { echo "no admin token — expected_skip"; exit 0; }
          for i in 1 2 3 4; do
            TRV=$(python3 scripts/workflow_http.py --name translate-visible --method POST --timeout 120 \
              --header-env X-ARGUS-ADMIN-TOKEN=ARGUS_ADMIN_TOKEN \
              --url "$BE/api/argus/admin/news/translate-visible")
            echo "translate-visible[$i]: ${TRV:0:200}"
            TRANSLATED=$(echo "$TRV" | python3 -c "import sys,json;print(json.load(sys.stdin).get('translated',0))" 2>/dev/null || echo 0)
            PENDING=$(echo "$TRV" | python3 -c "import sys,json;print(json.load(sys.stdin).get('pending',0))" 2>/dev/null || echo 0)
            [ "$TRANSLATED" = "0" ] && [ "$PENDING" = "0" ] && break
            sleep 5
          done

      # v11.9.1: persist the JA cache to the ledger branch — a Render redeploy
      # wipes /tmp, and 4 same-day deploys once reset EVERY headline to 翻訳待ち.
      # The snapshot is public-safe (hash→JA title only; no secrets/owner data).
      - name: Fetch translation-cache snapshot
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          for i in 1 2 3; do
            curl -sf --max-time 60 "$BE/api/argus/news/ja-cache-snapshot" \
              -o "$RUNNER_TEMP/news-ja.json" && break
            echo "retry $i"; sleep 10
          done
          test -s "$RUNNER_TEMP/news-ja.json"
          COUNT=$(python3 -c "import json;d=json.load(open('$RUNNER_TEMP/news-ja.json'));assert d.get('schemaVersion')=='news-ja-cache-v1';print(d.get('count',0))")
          echo "news-ja cache entries: $COUNT"
          # v12.2.4: osint耐久状態も30分毎にledgerへ(watchtower毎時の補完)
          for i in 1 2 3; do
            curl -sf --max-time 60 "$BE/api/argus/osint/memory-snapshot" \
              -o "$RUNNER_TEMP/osint-memory.json" && break
            echo "retry memory $i"; sleep 10
          done
          test -s "$RUNNER_TEMP/osint-memory.json"
          python3 -c "import json;d=json.load(open('$RUNNER_TEMP/osint-memory.json'));assert d.get('schemaVersion')=='argus-durable-v3'"
          # never overwrite the ledger with an empty cache (e.g. right after deploy)
          if [ "$COUNT" != "0" ] && [ -n "$COUNT" ]; then echo "PERSIST=1" >> "$GITHUB_ENV"; fi

      - name: Checkout (main)
        if: env.PERSIST == '1'
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Commit news-ja snapshot to ledger branch
        if: env.PERSIST == '1'
        run: |
          git fetch origin "ledger:refs/remotes/origin/ledger" 2>/dev/null \
            || git fetch origin ledger 2>/dev/null || true
          if git rev-parse --verify refs/remotes/origin/ledger >/dev/null 2>&1; then
            git checkout -B ledger refs/remotes/origin/ledger
          else
            echo "::warning::origin/ledger not found — skip (never create ledger from here)"
            exit 0
          fi
          mkdir -p ledger/news-ja ledger/osint
          cp "$RUNNER_TEMP/news-ja.json" ledger/news-ja/latest.json
          # v12.2.10 stale-writer guard: 複数workflow(caos-scan/watchtower)が
          # memory.jsonを書く — 古いsnapshotで新しいものを上書きする逆行を防ぐ
          # (generatedAt/asOfは同一Z形式=文字列比較可)。
          NEW_ASOF=$(python3 -c "import json;d=json.load(open('$RUNNER_TEMP/osint-memory.json'));print(d.get('generatedAt') or d.get('asOf') or '')" 2>/dev/null || echo "")
          OLD_ASOF=$(python3 -c "import json;d=json.load(open('ledger/osint/memory.json'));print(d.get('generatedAt') or d.get('asOf') or '')" 2>/dev/null || echo "")
          if [ -s "$RUNNER_TEMP/osint-memory.json" ] && [ -n "$NEW_ASOF" ] && \
             { [ -z "$OLD_ASOF" ] || [ "$NEW_ASOF" \> "$OLD_ASOF" ]; }; then
            cp "$RUNNER_TEMP/osint-memory.json" ledger/osint/memory.json
          else
            echo "skip osint/memory.json: not newer (new=$NEW_ASOF old=$OLD_ASOF)"
          fi
          git config user.name "argus-ledger[bot]"
          git config user.email "argus-ledger@users.noreply.github.com"
          git add ledger/news-ja/ ledger/osint/ 2>/dev/null || git add ledger/news-ja/
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "news-ja: $(date -u +%FT%TZ) translation-cache snapshot"
            git push origin HEAD:ledger \
              || { git pull --rebase origin ledger && git push origin HEAD:ledger; }
          fi
