# Mover Cause ledger (v11.3.3) — refresh the mover-cause ladder, optionally
# generate AI explanations for TOP unresolved movers (admin-gated, max 3/run),
# then persist a public-safe metadata snapshot to the ledger branch:
#   ledger/mover-causes/YYYY-MM-DD.json  (append-only per day)
#   ledger/mover-causes/latest.json     (overwritten)
# Every-2h cadence during JP+US sessions; the 15-min freshness refresh lives in
# ai-rejudge.yml (no LLM there). Secrets are never logged.
name: mover-causes
on:
  schedule:
    - cron: '50 0,2,4,6,14,16,18,20 * * 1-5'
  workflow_dispatch: {}
permissions:
  contents: write
# Serialize with every other ledger-branch writer.
concurrency:
  group: ledger-branch-writer
  cancel-in-progress: false

jobs:
  persist:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Refresh mover causes (admin)
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          if [ -z "$ARGUS_ADMIN_TOKEN" ]; then
            echo "::warning::ARGUS_ADMIN_TOKEN not set — skipping refresh (snapshot only)"
          else
            curl -s --max-time 60 "$BE/healthz" > /dev/null || true
            RES=$(python3 scripts/workflow_http.py --name mover-causes-refresh --method POST --timeout 180 \
              --header-env X-ARGUS-ADMIN-TOKEN=ARGUS_ADMIN_TOKEN \
              --url "$BE/api/argus/admin/mover-causes/refresh")
            echo "refresh: ${RES:0:200}"
            # AI explanation for the biggest unresolved movers only (cost-bounded).
            EXP=$(python3 scripts/workflow_http.py --name mover-causes-explain --method POST --timeout 240 \
              --header-env X-ARGUS-ADMIN-TOKEN=ARGUS_ADMIN_TOKEN \
              --header 'Content-Type: application/json' --data '{"max": 3}' \
              --url "$BE/api/argus/admin/mover-causes/explain")
            echo "explain: ${EXP:0:200}"
          fi

      - name: Fetch public-safe snapshot
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          for i in 1 2 3 4; do
            curl -sf --max-time 60 "$BE/api/argus/mover-causes/snapshot" \
              -o "$RUNNER_TEMP/mover-causes.json" && break
            echo "retry $i"; sleep 15
          done
          test -s "$RUNNER_TEMP/mover-causes.json"
          N=$(python3 -c "import json,sys; d=json.load(open('$RUNNER_TEMP/mover-causes.json')); print((d.get('summary') or {}).get('total', 0))")
          echo "items: $N"
          echo "ITEMS=$N" >> "$GITHUB_ENV"

      - name: Checkout (main)
        if: env.ITEMS != '0'
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Commit snapshot to ledger branch
        if: env.ITEMS != '0'
        run: |
          git fetch origin "ledger:refs/remotes/origin/ledger" 2>/dev/null \
            || git fetch origin ledger 2>/dev/null || true
          if git rev-parse --verify refs/remotes/origin/ledger >/dev/null 2>&1; then
            git checkout -B ledger refs/remotes/origin/ledger
          elif git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
            git checkout -B ledger FETCH_HEAD
          else
            echo "::warning::origin/ledger not found — creating a FRESH ledger branch (first run only)"
            git checkout --orphan ledger
            git rm -rq --cached . 2>/dev/null || true
            find . -maxdepth 1 ! -name ledger ! -name .git ! -name . -exec rm -rf {} + 2>/dev/null || true
          fi
          mkdir -p ledger/mover-causes
          DAY=$(TZ=Asia/Tokyo date +%F)
          cp "$RUNNER_TEMP/mover-causes.json" ledger/mover-causes/latest.json
          if [ ! -f "ledger/mover-causes/$DAY.json" ]; then
            cp "$RUNNER_TEMP/mover-causes.json" "ledger/mover-causes/$DAY.json"
          fi
          git config user.name "argus-ledger[bot]"
          git config user.email "argus-ledger@users.noreply.github.com"
          # Stage ONLY our own path so other writers' files are never wiped.
          git add ledger/mover-causes/
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "mover-causes: $(date -u +%FT%TZ) snapshot ($ITEMS items)"
            git push origin HEAD:ledger
          fi
