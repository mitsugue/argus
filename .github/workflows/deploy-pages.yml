name: Deploy web/ to GitHub Pages

on:
  push:
    # Deploy only from main. The github-pages environment allows deploys from
    # main (and gh-pages) only, so triggering on a feature branch produced a
    # build that always failed at the deploy step — noisy failure emails for no
    # reason. Feature work reaches Pages by merging/fast-forwarding into main.
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub's recommended Pages pattern: do NOT cancel in-progress deploys —
# cancelling actions/deploy-pages mid-flight leaves the github-pages environment
# with a PENDING deployment that blocks/hangs the next run (the v10.144 cancel:true
# experiment made the timeouts worse). false = let each deploy complete; the build
# job's own concurrency + the 5-min deploy timeout below handle a genuine infra hang
# (it fails fast and the next push recovers; the live site stays current).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      backend_deploy: ${{ steps.scope.outputs.backend_deploy }}
      backend_sha: ${{ steps.scope.outputs.backend_sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: scope
        env:
          CURRENT_SHA: ${{ github.sha }}
        run: |
          python3 -B - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import subprocess
          from scripts.deploy_scope import classify
          paths = subprocess.check_output(
              ["git", "diff", "--name-only", "HEAD^", "HEAD"], text=True
          ).splitlines()
          backend = classify(paths)["backendDeploy"]
          print("backend_deploy=" + str(backend).lower())
          print("backend_sha=" + (os.environ["CURRENT_SHA"] if backend else ""))
          PY

  build:
    needs: scope
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build
        env:
          DEPLOY_BASE: /argus/
          VITE_ARGUS_BUILD_SHA: ${{ github.sha }}
          # Wire the ARGUS UI to the live Render backend so the Rates
          # Snapshot / status pill render `live` instead of `mock`. This
          # is also set in web/.env.production (auto-loaded by Vite); the
          # explicit value here makes the wiring visible in CI logs and
          # keeps it working even if that file is absent. Not a secret —
          # it's a public endpoint the client calls directly, and VITE_-
          # prefixed vars are client-exposed by design.
          VITE_ARGUS_BACKEND_URL: https://argus-backend-3j2m.onrender.com
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  seed-warm-profile:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Install pinned public-acceptance browser
        working-directory: web
        run: |
          npm install --no-save --no-package-lock playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Seed pre-deploy PWA profile from current public release
        working-directory: web
        env:
          ARGUS_ACCEPTANCE_MODE: seed
          ARGUS_PUBLIC_URL: https://mitsugue.github.io/argus/
          ARGUS_WARM_PROFILE_DIR: ../artifacts/market-warm-profile
        run: node scripts/public-market-acceptance.mjs
      - name: Remove browser-private stores before transfer
        run: |
          find artifacts/market-warm-profile -type d \
            \( -name 'Local Storage' -o -name 'Session Storage' \
               -o -name 'IndexedDB' \) \
            -prune -exec rm -rf '{}' +
          find artifacts/market-warm-profile -type f \
            \( -name 'Cookies' -o -name 'Cookies-journal' \
               -o -name 'History' -o -name 'History-journal' \) \
            -delete
      - uses: actions/upload-artifact@v4
        with:
          name: market-warm-profile-${{ github.sha }}
          path: artifacts/market-warm-profile
          include-hidden-files: true
          retention-days: 1

  deploy:
    needs: [build, seed-warm-profile]
    runs-on: ubuntu-latest
    # Pages publish flakes with an instant "Deployment cancelled" (or a 5-min hang)
    # when GitHub's backend races deployments for the same commit. Observed fix
    # (2026-07-02): let the environment settle ~4 minutes, then retry ONCE, alone.
    # 3 attempts x 5-min timeout + 2 x 4-min settles ≈ 23 min worst case.
    # Retrying inside one run means a transient flake never emails a failure.
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 300000        # 5 min (default 10) — fail fast on a stuck Pages env

      - name: Settle before retry 1 (Pages backend races cancel same-commit deploys)
        if: steps.deployment.outcome == 'failure'
        run: sleep 240

      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 300000

      - name: Settle before retry 2
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 240

      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4    # final attempt — a real failure should fail the job
        with:
          timeout: 300000

  public-acceptance:
    needs: [scope, deploy, seed-warm-profile]
    # The live directly linked Render service still uses checksPass. A
    # backend-sensitive public check would wait for Render while Render waits
    # for that same check. Complete it through market-public-acceptance.yml
    # after Render deploys, using this run's pre-deploy warm-profile artifact.
    if: needs.scope.outputs.backend_deploy != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - name: Install pinned public-acceptance browser
        working-directory: web
        run: |
          npm install --no-save --no-package-lock playwright@1.55.0
          npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v5
        with:
          name: market-warm-profile-${{ github.sha }}
          path: artifacts/warm-seed
      - name: Resolve independent release versions
        id: release
        run: |
          node -p '"frontend_version=" + require("./web/package.json").version' >> "$GITHUB_OUTPUT"
          python3 -c 'import json; print("backend_version=" + json.load(open("backend-version.json"))["version"])' >> "$GITHUB_OUTPUT"
      - name: Verify deployed public URL and PWA upgrade
        working-directory: web
        env:
          ARGUS_PUBLIC_URL: https://mitsugue.github.io/argus/
          ARGUS_EXPECTED_VERSION: ${{ steps.release.outputs.frontend_version }}
          ARGUS_EXPECTED_SHA: ${{ github.sha }}
          ARGUS_EXPECTED_BACKEND_VERSION: ${{ steps.release.outputs.backend_version }}
          ARGUS_EXPECTED_BACKEND_SHA: ${{ needs.scope.outputs.backend_sha }}
          ARGUS_WARM_PROFILE_DIR: ../artifacts/warm-seed
          ARGUS_ACCEPTANCE_OUT: ../artifacts/market-public-acceptance
        run: node scripts/public-market-acceptance.mjs
      - name: Publish reproducible public acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-public-acceptance-${{ github.sha }}
          path: artifacts/market-public-acceptance
          if-no-files-found: error
          retention-days: 30
