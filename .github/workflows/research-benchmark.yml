name: formal-research-benchmark

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Approved one-shot operation
        required: true
        default: benchmark
        type: choice
        options:
          - benchmark
          - jpx_credit_import
          - provider_probe
          - breadth_backfill
          - breadth_incremental
          - journal_reverify

permissions:
  contents: read

concurrency:
  group: formal-research-benchmark-one-shot
  cancel-in-progress: false

jobs:
  benchmark:
    if: inputs.operation == 'benchmark'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Dry-run, execute once, and verify deterministic restore
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: >-
          python3 scripts/run_foundation_job.py
          --job-type RESEARCH_BENCHMARK
          --max-wait-seconds 3000

  breadth-backfill:
    if: inputs.operation == 'breadth_backfill' || inputs.operation == 'breadth_incremental'
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run resumable J-Quants breadth job
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
          OPERATION: ${{ inputs.operation }}
        shell: bash
        run: |
          set -euo pipefail
          job_type=JQUANTS_BREADTH_BACKFILL
          parameters='{}'
          resume_arg=--resume
          if [ "$OPERATION" = "breadth_incremental" ]; then
            job_type=JQUANTS_BREADTH_INCREMENTAL
            parameters='{}'
            resume_arg=
          fi
          python3 scripts/run_foundation_job.py \
            --job-type "$job_type" \
            --parameters-json "$parameters" \
            $resume_arg \
            --poll-seconds 30 --max-wait-seconds 21000

  journal-reverify:
    if: inputs.operation == 'journal_reverify'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Reverify the committed Remote Journal snapshot
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: >-
          python3 scripts/run_foundation_job.py
          --job-type JOURNAL_REVERIFY
          --poll-seconds 5 --max-wait-seconds 600

  jpx-credit-import:
    if: inputs.operation == 'jpx_credit_import'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Validate, import, and verify JPX two-market credit data
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ARGUS_ADMIN_TOKEN:-}" ]; then
            echo "ARGUS_ADMIN_TOKEN is not configured" >&2
            exit 1
          fi

          backend="https://argus-backend-3j2m.onrender.com"
          csv_path="ops/imports/jpx_two_market_credit_20020802_20260710.csv"
          dry_payload="$RUNNER_TEMP/jpx-credit-dry.json"
          commit_payload="$RUNNER_TEMP/jpx-credit-commit.json"
          dry_response="$RUNNER_TEMP/jpx-credit-dry-response.json"
          commit_response="$RUNNER_TEMP/jpx-credit-commit-response.json"

          jq -n --rawfile csv "$csv_path" '{csv: $csv, dryRun: true}' > "$dry_payload"
          dry_http=$(curl --silent --show-error --fail-with-body --max-time 300 \
            --output "$dry_response" --write-out '%{http_code}' \
            --request POST --header 'Content-Type: application/json' \
            --header "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            --data-binary "@$dry_payload" \
            "$backend/api/argus/admin/market-ledger/import")
          jq -e '.ok == true and .dryRun == true and (.errors | length) == 0 and (.preview | length) == 2434' \
            "$dry_response" >/dev/null
          jq '{ok, dryRun, importId, rowCount: (.preview | length), errorCount: (.errors | length)}' \
            "$dry_response"
          echo "dry-run HTTP $dry_http"

          jq -n --rawfile csv "$csv_path" '{csv: $csv, dryRun: false}' > "$commit_payload"
          commit_http=$(curl --silent --show-error --fail-with-body --max-time 600 \
            --output "$commit_response" --write-out '%{http_code}' \
            --request POST --header 'Content-Type: application/json' \
            --header "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            --data-binary "@$commit_payload" \
            "$backend/api/argus/admin/market-ledger/import")
          jq -e '.ok == true and .dryRun == false and (.errors | length) == 0 and (.preview | length) == 2434' \
            "$commit_response" >/dev/null
          jq '{ok, dryRun, importId, rowCount: (.preview | length), errorCount: (.errors | length)}' \
            "$commit_response"
          echo "commit HTTP $commit_http"

          ledger_response="$RUNNER_TEMP/market-ledger-readback.json"
          curl --silent --show-error --fail-with-body --max-time 180 \
            --output "$ledger_response" "$backend/api/argus/market-ledger"
          jq -e '.observationCount >= 3749 and
            ([.table[] | select(.seriesId == "credit.short_balance")][0].periodEnd == "2026-07-10") and
            ([.table[] | select(.seriesId == "credit.short_balance")][0].latestValue == 795524000000) and
            ([.table[] | select(.seriesId == "credit.long_balance")][0].latestValue == 6732228000000)' \
            "$ledger_response" >/dev/null
          jq '{observationCount, stateHash,
            credit: [.table[] | select(.seriesId == "credit.short_balance" or .seriesId == "credit.long_balance") |
              {seriesId, periodEnd, latestValue, previousChange, fourPeriodDirection, thresholdDistance, thresholdStreak}],
            turningPointCount: (.turningPoints | length)}' "$ledger_response"

  provider-probe:
    if: inputs.operation == 'provider_probe'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Probe approved OpenAI models and restore deterministic mode
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${ARGUS_ADMIN_TOKEN:-}" ]; then
            echo "ARGUS_ADMIN_TOKEN is not configured" >&2
            exit 1
          fi

          backend="https://argus-backend-3j2m.onrender.com"
          response="$RUNNER_TEMP/openai-model-probe.json"
          restore_response="$RUNNER_TEMP/cost-policy-restore.json"

          restore_deterministic() {
            curl --silent --show-error --fail-with-body --max-time 180 \
              --output "$restore_response" --request POST \
              --header 'Content-Type: application/json' \
              --header "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
              --data '{"confirm":true,"mode":"DETERMINISTIC"}' \
              "$backend/api/argus/admin/cost-policy" >/dev/null
          }
          trap restore_deterministic EXIT

          curl --silent --show-error --fail-with-body --max-time 180 \
            --request POST --header 'Content-Type: application/json' \
            --header "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            --data '{"confirm":true,"mode":"MANUAL"}' \
            "$backend/api/argus/admin/cost-policy" \
            | jq -e '.ok == true and .mode == "MANUAL"' >/dev/null

          curl --silent --show-error --fail-with-body --max-time 180 \
            --output "$response" --request POST \
            --header 'Content-Type: application/json' \
            --header "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            --data '{"models":["gpt-5.6-sol","gpt-5.6-terra"],"geminiModels":["gemini-3.1-pro-preview"],"confirm":true,"reason":"Approved pre-benchmark model availability probe; no holdout consumption"}' \
            "$backend/api/argus/admin/ai/capability-probe"
          jq -e '.ok == true and (.results | length) == 2 and (.geminiResults | length) == 1 and
            all(.results[]; .accessible == true and .responsesSupported == true and .usageReturned == true and .responseModel != null and .errorClass == null) and
            all(.geminiResults[]; .accessible == true and .usageReturned == true and .responseModel != null and .errorClass == null) and
            .results[0].responseModel != .results[1].responseModel' \
            "$response" >/dev/null
          jq '{ok, provider, estimatedCostUsdPerModel,
            results: [.results[] | {requestedModel, responseModel, accessible,
              responsesSupported, usageReturned, errorClass}],
            geminiResults: [.geminiResults[] | {requestedModel, responseModel,
              accessible, usageReturned, errorClass}]}' \
            "$response"

          restore_deterministic
          trap - EXIT
          jq -e '.ok == true and .mode == "DETERMINISTIC"' "$restore_response" >/dev/null
          jq '{ok, mode, automaticAiEnabled, todayRuns, todayEstimatedCostUsd}' "$restore_response"
