# ARGUS Morning Digest — the agent's daily push.
# Fetches /api/argus/daily-digest (rule-based, no LLM) every JP weekday morning
# and pushes the Japanese brief to ntfy.sh (zero-signup push relay).
#
# Setup (one-time, optional — the workflow no-ops gracefully without it):
#   1. Install the ntfy app (iOS/Android) and subscribe to a topic with a long
#      random name you invent, e.g. "argus-mitsugu-x7k2p9q4w1".
#   2. Repo → Settings → Secrets and variables → Actions → New repository secret
#      Name: NTFY_TOPIC / Value: that topic name.
# The topic name acts as the delivery address+password — keep it private.
# Digest content is market commentary only (no holdings, no personal data).

name: morning-digest

on:
  schedule:
    # GitHub's free cron is best-effort and has been observed running 2–5h late
    # (a late US run once delivered at 00:46 JST). Strategy: fire VERY EARLY so
    # even a multi-hour delay still lands BEFORE the target, then let ntfy's
    # server-side "Delay" hold the message and deliver at the exact JST time.
    # The session is taken from github.event.schedule (not the clock) so a big
    # delay can't misclassify JP vs US. Market data doesn't change in the gap.
    # 18:00 UTC Sun–Thu → held to 23:30 UTC (=08:30 JST, TSE pre-open). 5.5h buffer.
    - cron: '0 18 * * 0-4'
    # 07:00 UTC Mon–Fri → held to 13:00 UTC (=22:00 JST, NYSE pre-open). 6h buffer.
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}

permissions: {}

jobs:
  push-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch digest (retry through Render cold start)
        id: digest
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          for i in 1 2 3 4 5 6; do
            if curl -sf --max-time 60 "$BE/api/argus/daily-digest" -o digest.json; then
              break
            fi
            echo "attempt $i failed (cold start?) — retrying in 20s"
            sleep 20
          done
          test -s digest.json
          python3 - <<'PY'
          import json
          d = json.load(open('digest.json'))
          text = d.get('textJa') or 'ARGUS digest unavailable'
          open('digest.txt', 'w').write(text)
          print(f"status={d.get('status')} date={d.get('dateJst')}")
          PY

      - name: Push to ntfy (skipped when NTFY_TOPIC secret is not set)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GH_SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC not configured — skipping push (digest fetched OK)."
            exit 0
          fi
          # Session from the CRON that fired (robust — a multi-hour delay can't
          # misclassify JP vs US). Target = exact JST delivery time; ntfy holds the
          # message server-side via Delay. If the cron ran so late that we're well
          # PAST the target (stale brief), SKIP rather than buzzing at a weird hour
          # (user got one at 00:46 JST). No Click header (user request 2026-06-11).
          python3 - <<'PY' > sched.env
          import datetime, os
          now = datetime.datetime.now(datetime.timezone.utc)
          sched = os.environ.get("GH_SCHEDULE", "")
          if sched.startswith("0 18"):
              session, th, tm = "JP open", 23, 30
          elif sched.startswith("0 7"):
              session, th, tm = "US open", 13, 0
          else:  # manual dispatch — fall back to the clock
              h = now.hour
              session, th, tm = ("JP open", 23, 30) if (h >= 18 or h < 6) else ("US open", 13, 0)
          target = now.replace(hour=th, minute=tm, second=0, microsecond=0)
          if session == "JP open" and now.hour < 6:   # delayed past midnight UTC
              target -= datetime.timedelta(days=1)
          past = (now - target).total_seconds()
          GRACE = 90 * 60   # >90 min late = stale; skip the weird-hour buzz
          if past > GRACE:
              print("SKIP=1")
          else:
              margin = datetime.timedelta(seconds=120)
              delay = int(target.timestamp()) if target > now + margin else 0
              jst = datetime.timezone(datetime.timedelta(hours=9))
              shown = (target if delay else now).astimezone(jst)
              print("SKIP=0")
              print(f'SESSION="{session}"')
              print(f"DELAY={delay}")
              print(f'SENTAT="{shown.strftime("%m/%d %H:%M")}"')
          PY
          . ./sched.env
          if [ "$SKIP" = "1" ]; then
            echo "cron ran >90min past target — skipping stale digest (no weird-hour buzz)."
            exit 0
          fi
          DELAY_HDR=()
          if [ "$DELAY" != "0" ]; then DELAY_HDR=(-H "Delay: $DELAY"); fi
          curl -sf --max-time 30 \
            -H "Title: ARGUS Digest - $SESSION ($SENTAT)" \
            -H "Tags: chart_with_upwards_trend" \
            "${DELAY_HDR[@]}" \
            --data-binary @digest.txt \
            "https://ntfy.sh/$NTFY_TOPIC" > /dev/null
          echo "digest pushed (session=$SESSION delay=$DELAY sentAt=$SENTAT)."
