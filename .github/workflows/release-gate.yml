name: release-gate
# v12.2.5: main push+PRで完全ゲート。manifestはCIのGITHUB_SHAに対して生成し
# artifactとして公開(コミットされた古いmanifestを真実にしない)。
# オーナー設定要件(手動): main branch protectionでci/release-gateを必須化+
# Render Auto-Deploy = "After CI Checks Pass"。
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - uses: actions/setup-node@v5
        with: {node-version: "22"}
      - name: Enforce Render deploy-plane contract
        env:
          ARGUS_RENDER_EVENT: ${{ github.event_name }}
          ARGUS_RENDER_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          ARGUS_RENDER_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          ARGUS_RENDER_SKIP_TEXT: ${{ github.event.pull_request.title || github.event.head_commit.message || '' }}
        run: python3 scripts/render_deploy_guard.py
      - name: Install deps (ci.ymlと同一セット)
        run: pip install --quiet anthropic flask flask-cors requests pytz python-dotenv json-repair pytest
      - name: Install web deps
        run: cd web && npm ci --no-audit --no-fund
      - name: Full gate for exact SHA
        run: |
          bash scripts/release_gate.sh || true
          cat artifacts/release_manifest.json
      - name: Verify manifest matches exact CI SHA (stale=ineligible)
        run: |
          python3 - <<'PY'
          import json, os, sys
          m = json.load(open("artifacts/release_manifest.json"))
          if m["commitSha"] != os.environ["GITHUB_SHA"]:
              print("STALE MANIFEST: manifest sha != CI sha"); sys.exit(1)
          sys.exit(0 if m["eligibleForDeploy"] else 1)
          PY
        env:
          GITHUB_SHA: ${{ github.sha }}
      - name: Publish manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ github.sha }}
          path: artifacts/release_manifest.json
