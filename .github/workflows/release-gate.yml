name: release-gate
# v12.2.4: mainへのpush毎に完全ゲートを実行し、正確なSHAの適格性を記録する。
# (Render auto-deployの停止はオーナー側設定 — 本workflowはSHA適格性の監査証跡)
on:
  push:
    branches: [main]
  workflow_dispatch: {}
jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: {python-version: "3.12"}
      - uses: actions/setup-node@v5
        with: {node-version: "22"}
      - name: Install deps (ci.ymlと同一セット)
        run: pip install --quiet anthropic flask flask-cors requests pytz python-dotenv json-repair pytest
      - name: Install web deps
        run: cd web && npm ci --no-audit --no-fund
      - name: Full gate for exact SHA
        run: |
          bash scripts/release_gate.sh
          cat release_manifest.json
      - name: Fail if ineligible
        run: |
          python3 -c "import json,sys; m=json.load(open('release_manifest.json')); sys.exit(0 if m['eligibleForDeploy'] else 1)"
