# ARGUS Prediction Ledger — the self-scoring loop (v10.3).
#
# Every JP trading day at 16:05 JST:
#   1. (optional) trigger a fresh AI judgment run so AI views are recorded
#      (needs the ARGUS_ADMIN_TOKEN repo secret; skipped gracefully without it)
#   2. record today's falsifiable predictions  -> ledger/days/YYYY-MM-DD.json
#   3. score past unscored snapshots against realized moves
#                                              -> ledger/scores/YYYY-MM-DD.json
#   4. rebuild the running accuracy summary    -> ledger/summary.json
#
# Data lives on the `ledger` BRANCH (not main) so daily commits never trigger
# the Pages/Render deploys. The ledger covers the curated engine symbols and
# market context only — NO personal holdings ever.
# Scoring: realized next-session move vs the predicted scenario distribution
# (argmax hit + Brier score), recorded separately for the RULE engine and the
# AI views so their accuracy can be compared per market context over time.

name: prediction-ledger

on:
  schedule:
    - cron: '5 7 * * 1-5'   # 07:05 UTC = 16:05 JST Mon-Fri (after TSE close)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  record-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger AI judgment run (skipped without ARGUS_ADMIN_TOKEN secret)
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          if [ -z "$ARGUS_ADMIN_TOKEN" ]; then
            echo "::warning::ARGUS_ADMIN_TOKEN secret is EMPTY in this run — AI skipped"
            echo "🤖 AI: **secret missing** — rule-only predictions recorded" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "token present (length ${#ARGUS_ADMIN_TOKEN})"
          # Warm the dyno, then surface the gate state on the run page (the
          # security-status payload is booleans/limits only — no secrets).
          curl -s --max-time 90 "$BE/api/argus/rates" > /dev/null || true
          GATE=$(curl -s --max-time 60 -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" "$BE/api/argus/security-status" || echo '{"error":"unreachable"}')
          echo "gate: $GATE"
          echo "🔐 gate: \`${GATE}\`" >> "$GITHUB_STEP_SUMMARY"
          RESP=$(curl -s --max-time 240 -X POST \
            -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            "$BE/api/argus/ai-judgment/run" || echo '{"error":"unreachable"}')
          SHORT=$(echo "$RESP" | head -c 300)
          echo "ai run: $SHORT"
          echo "🤖 ai run: \`${SHORT}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout ledger branch
        uses: actions/checkout@v5
        with:
          ref: main
      - name: Switch to ledger branch (create if missing)
        run: |
          git fetch origin ledger:ledger 2>/dev/null && git checkout ledger || git checkout --orphan ledger
          if [ ! -d ledger ]; then mkdir -p ledger/days ledger/scores; fi
          # Orphan branch starts with main's tree staged — keep only ledger/.
          git rm -rq --cached . 2>/dev/null || true
          find . -maxdepth 1 ! -name ledger ! -name .git ! -name . -exec rm -rf {} + 2>/dev/null || true

      - name: Persist backup vault (client-side-encrypted envelopes)
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          if [ -z "$ARGUS_ADMIN_TOKEN" ]; then echo '{}' > vault.json; else
            curl -s --max-time 60 -X POST -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
              "$BE/api/argus/vault-pull" -o vault.json || echo '{}' > vault.json
          fi
          python3 - <<'PY'
          import json, os, glob, datetime
          slots = (json.load(open('vault.json')) or {}).get('slots') or {}
          for vid, slot in slots.items():
              if not (isinstance(vid, str) and len(vid) == 64 and all(c in '0123456789abcdef' for c in vid)):
                  continue
              d = f'ledger/vault/{vid}'
              os.makedirs(d, exist_ok=True)
              stamp = datetime.datetime.utcfromtimestamp(slot.get('ts', 0)).strftime('%Y-%m-%dT%H%M%SZ')
              open(f'{d}/{stamp}.json', 'w').write(slot['blob'])
              open(f'{d}/latest.json', 'w').write(slot['blob'])
              # Old backups are disposable (user-approved): keep the newest 8.
              hist = sorted(p for p in glob.glob(f'{d}/*.json') if not p.endswith('latest.json'))
              for old in hist[:-8]:
                  os.remove(old)
              print('vault saved:', vid[:12], stamp)
          if not slots:
              print('no pending vault envelopes')
          PY

      # ai-persist-v1: the public GET payload (no secrets) is committed to the
      # ledger branch so a restarted Render dyno can restore the latest real AI
      # view instead of showing "not run yet" all day.
      - name: Persist AI judgment for dyno-restart restore
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          curl -s --max-time 60 "$BE/api/argus/ai-judgment" -o ai.json || echo '{}' > ai.json
          python3 - <<'PY'
          import json, os
          try:
              d = json.load(open('ai.json'))
          except Exception:
              d = {}
          if isinstance(d, dict) and d.get('status') in ('live', 'partial') and d.get('labels'):
              os.makedirs('ledger/ai', exist_ok=True)
              json.dump(d, open('ledger/ai/latest.json', 'w'), ensure_ascii=False)
              print('AI judgment persisted:', d.get('status'), d.get('asOf'))
          else:
              s = d.get('status') if isinstance(d, dict) else '?'
              print(f'no live AI judgment to persist (status={s}) — previous file kept')
          PY

      - name: Record today's predictions + score the past
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          for i in 1 2 3 4 5 6; do
            curl -sf --max-time 60 "$BE/api/argus/prediction-snapshot" -o snap.json && break
            echo "retry $i"; sleep 20
          done
          test -s snap.json
          curl -sf --max-time 60 "$BE/api/argus/japan-watchlist" -o jp.json || echo '{}' > jp.json
          curl -sf --max-time 60 "$BE/api/argus/us-watchlist"   -o us.json || echo '{}' > us.json
          curl -sf --max-time 90 "$BE/api/argus/class-quotes"    -o cls.json || echo '{}' > cls.json
          curl -sf --max-time 90 "$BE/api/argus/sensor-quotes"   -o sens.json || echo '{}' > sens.json
          curl -sf --max-time 60 "$BE/api/argus/crypto-watchlist" -o cw.json || echo '{}' > cw.json
          python3 - <<'PY'
          import json, os, glob, datetime

          snap = json.load(open('snap.json'))
          today = snap['dateJst']
          os.makedirs('ledger/days', exist_ok=True)
          os.makedirs('ledger/scores', exist_ok=True)

          # 1. Record today's snapshot (idempotent — last run of the day wins).
          json.dump(snap, open(f'ledger/days/{today}.json', 'w'),
                    ensure_ascii=False, indent=1)
          print('recorded', today, len(snap['predictions']), 'predictions')

          # 2. Current live prices for scoring (stocks + class proxies + crypto).
          now_price = {}
          for f in ('jp.json', 'us.json'):
              for s in (json.load(open(f)).get('stocks') or []):
                  if s.get('status') == 'live':
                      now_price[s['symbol']] = float(s['price'])
          cls_price = {sym: q['price'] for sym, q in
                       ((json.load(open('cls.json')).get('quotes')) or {}).items()}
          for q in (json.load(open('cw.json')).get('quotes') or []):
              if q.get('status') == 'live':
                  cls_price[q['id']] = float(q['priceUsd'])

          def bucket(pct):
              if pct < -2: return 'downside_continuation'
              if pct > 2:  return 'rebound_attempt'
              return 'sideways_stabilization'

          DIRECTIONAL = {'BUY DIP': 'up', 'ADD': 'up', 'TRIM': 'down', 'EXIT': 'down'}

          # 3. Score unscored snapshots that are 1..7 days old.
          for path in sorted(glob.glob('ledger/days/*.json')):
              d = os.path.basename(path)[:-5]
              if d >= today: continue
              spath = f'ledger/scores/{d}.json'
              if os.path.exists(spath): continue
              age = (datetime.date.fromisoformat(today) - datetime.date.fromisoformat(d)).days
              if age > 7: continue
              day = json.load(open(path))
              if day.get('engineVersion') == 'ledger-v3': continue  # scored by the v3 loop below
              rows, hits, briers = [], 0, []
              ai_hits, ai_total = 0, 0
              for p in day.get('predictions', []):
                  cur = now_price.get(p['symbol'])
                  if cur is None or not p.get('price'): continue
                  realized = (cur / p['price'] - 1) * 100
                  b = bucket(realized)
                  probs = {s['label']: s['p'] / 100 for s in p['scenarios']}
                  argmax = max(probs, key=lambda k: probs[k])
                  hit = (argmax == b)
                  brier = sum((probs.get(k, 0) - (1.0 if k == b else 0.0)) ** 2
                              for k in ('downside_continuation', 'sideways_stabilization', 'rebound_attempt'))
                  hits += hit; briers.append(brier)
                  ai = p.get('ai') or {}
                  ai_dir = DIRECTIONAL.get(ai.get('action') or '')
                  ai_hit = None
                  if ai_dir:
                      ai_total += 1
                      ai_hit = (ai_dir == 'up' and realized > 0) or (ai_dir == 'down' and realized < 0)
                      ai_hits += bool(ai_hit)
                  rows.append({'symbol': p['symbol'], 'predPrice': p['price'], 'curPrice': cur,
                               'realizedPct': round(realized, 2), 'bucket': b,
                               'argmax': argmax, 'hit': hit, 'brier': round(brier, 4),
                               'action': p['action'], 'aiAction': ai.get('action'),
                               'aiDirectionalHit': ai_hit})
              # Asset-class predictions (ledger-v2): same buckets/metrics.
              crows, chits, cbriers = [], 0, []
              for p in day.get('classPredictions', []):
                  cur = cls_price.get(p['symbol'])
                  if cur is None or not p.get('price'): continue
                  realized = (cur / p['price'] - 1) * 100
                  b = bucket(realized)
                  probs = {s['label']: s['p'] / 100 for s in p['scenarios']}
                  argmax = max(probs, key=lambda k: probs[k])
                  hit = (argmax == b)
                  brier = sum((probs.get(k, 0) - (1.0 if k == b else 0.0)) ** 2
                              for k in ('downside_continuation', 'sideways_stabilization', 'rebound_attempt'))
                  chits += hit; cbriers.append(brier)
                  crows.append({'assetClass': p['assetClass'], 'symbol': p['symbol'],
                                'realizedPct': round(realized, 2), 'bucket': b,
                                'argmax': argmax, 'hit': hit, 'brier': round(brier, 4)})
              # Posture call: graded by its own self-describing rule vs SPY.
              posture_row = None
              pp = day.get('posturePrediction')
              if pp and pp.get('rule') and cls_price.get(pp.get('proxy', 'SPY')):
                  move = (cls_price[pp['proxy']] / pp['price'] - 1) * 100
                  r = pp['rule']
                  ok = ((move > 0) if (r['type'] == 'direction' and r['sign'] > 0) else
                        (move < 0) if (r['type'] == 'direction') else
                        (abs(move) >= r.get('minPct', 1.0)))
                  posture_row = {'posture': pp['posture'], 'movePct': round(move, 2), 'hit': bool(ok)}
              if not rows and not crows and not posture_row: continue
              score = {'date': d, 'scoredOn': today, 'ageDays': age,
                       'context': day.get('context', {}),
                       'n': len(rows), 'argmaxHits': hits,
                       'hitRate': round(hits / len(rows), 3) if rows else None,
                       'brierMean': round(sum(briers) / len(briers), 4) if briers else None,
                       'aiDirectional': {'n': ai_total, 'hits': ai_hits},
                       'classes': {'n': len(crows), 'hits': chits,
                                   'hitRate': round(chits / len(crows), 3) if crows else None,
                                   'brierMean': round(sum(cbriers) / len(cbriers), 4) if cbriers else None,
                                   'rows': crows},
                       'postureRow': posture_row,
                       'rows': rows}
              json.dump(score, open(spath, 'w'), ensure_ascii=False, indent=1)
              print('scored', d, f"hit {hits}/{len(rows)} brier {score['brierMean']}")

          # 3b. ledger-v3 (decided 2026-06-11): layer-separated scoring at
          # 1/3/5 TRADING-day horizons. Layer 1 = the fixed 16 sensors
          # (scored vs /sensor-quotes, per-row bandPct buckets); tactical
          # stock rows split by their .layer field; Layer 3 never mixes into
          # Layer-1 stats. A day's score file fills horizon slots
          # progressively across runs (re-opened until all horizons done).
          sens_now = (json.load(open('sens.json')).get('quotes') or {})

          def tdays(d0, d1):
              n = 0
              c = datetime.date.fromisoformat(d0)
              end = datetime.date.fromisoformat(d1)
              while c < end:
                  c += datetime.timedelta(days=1)
                  if c.weekday() < 5:
                      n += 1
              return n

          def score_rows(pred_rows, price_of, key_field):
              rows, hits, briers = [], 0, []
              for p in pred_rows:
                  cur = price_of(p)
                  if cur is None or not p.get('price'):
                      continue
                  realized = (cur / p['price'] - 1) * 100
                  band = float(p.get('bandPct') or 2.0)
                  b = ('downside_continuation' if realized < -band else
                       'rebound_attempt' if realized > band else 'sideways_stabilization')
                  probs = {s['label']: s['p'] / 100 for s in p['scenarios']}
                  argmax = max(probs, key=lambda k: probs[k])
                  hit = (argmax == b)
                  brier = sum((probs.get(k, 0) - (1.0 if k == b else 0.0)) ** 2 for k in probs)
                  hits += hit
                  briers.append(brier)
                  rows.append({key_field: p.get(key_field) or p.get('symbol'),
                               'realizedPct': round(realized, 2), 'bucket': b,
                               'argmax': argmax, 'hit': hit, 'brier': round(brier, 4)})
              return {'n': len(rows), 'hits': hits,
                      'hitRate': round(hits / len(rows), 3) if rows else None,
                      'brierMean': round(sum(briers) / len(briers), 4) if briers else None,
                      'rows': rows}

          HORIZONS = (1, 3, 5)
          for path in sorted(glob.glob('ledger/days/*.json')):
              d = os.path.basename(path)[:-5]
              if d >= today:
                  continue
              day = json.load(open(path))
              if day.get('engineVersion') != 'ledger-v3':
                  continue
              cal_age = (datetime.date.fromisoformat(today) - datetime.date.fromisoformat(d)).days
              if cal_age > 14:
                  continue
              ta = tdays(d, today)
              spath = f'ledger/scores/{d}.json'
              sc = {'date': d, 'engine': 'ledger-v3',
                    'context': day.get('context', {}), 'horizons': {}}
              if os.path.exists(spath):
                  prev = json.load(open(spath))
                  if prev.get('engine') == 'ledger-v3':
                      sc = prev
              if all(str(h) in sc['horizons'] for h in HORIZONS):
                  continue
              stock_price = lambda p: now_price.get(p['symbol'])
              preds = day.get('predictions') or []
              changed = False
              for h in HORIZONS:
                  hk = str(h)
                  if hk in sc['horizons'] or ta < h:
                      continue
                  block = {
                      'scoredOn': today, 'tradingAge': ta,
                      'layer1': {
                          'sensors': score_rows(day.get('sensors') or [],
                                                lambda p: sens_now.get(p.get('sensor')), 'sensor'),
                          'stocks': score_rows([p for p in preds if p.get('layer') == 1],
                                               stock_price, 'symbol'),
                      },
                      'layer2': score_rows([p for p in preds if p.get('layer', 2) == 2],
                                           stock_price, 'symbol'),
                      'layer3': score_rows([p for p in preds if p.get('layer') == 3],
                                           stock_price, 'symbol'),
                  }
                  if h == 1:
                      # Legacy-continuity sections live on the 1D horizon: the
                      # class proxies, AI directional grading and the posture call.
                      block['classes'] = score_rows(day.get('classPredictions') or [],
                                                    lambda p: cls_price.get(p['symbol']), 'assetClass')
                      ai_total = ai_hits = 0
                      for p in preds:
                          cur = now_price.get(p['symbol'])
                          ai_dir = DIRECTIONAL.get(((p.get('ai') or {}).get('action')) or '')
                          if cur is None or not p.get('price') or not ai_dir:
                              continue
                          realized = (cur / p['price'] - 1) * 100
                          ai_total += 1
                          ai_hits += bool((ai_dir == 'up' and realized > 0) or
                                          (ai_dir == 'down' and realized < 0))
                      block['aiDirectional'] = {'n': ai_total, 'hits': ai_hits}
                      pp = day.get('posturePrediction')
                      spy_now = sens_now.get('SPY') or cls_price.get('SPY')
                      if pp and pp.get('rule') and spy_now and pp.get('price'):
                          move = (spy_now / pp['price'] - 1) * 100
                          r = pp['rule']
                          ok = ((move > 0) if (r['type'] == 'direction' and r['sign'] > 0) else
                                (move < 0) if (r['type'] == 'direction') else
                                (abs(move) >= r.get('minPct', 1.0)))
                          block['posture'] = {'posture': pp['posture'],
                                              'movePct': round(move, 2), 'hit': bool(ok)}
                  sc['horizons'][hk] = block
                  changed = True
              if changed:
                  json.dump(sc, open(spath, 'w'), ensure_ascii=False, indent=1)
                  print('scored-v3', d, 'horizons', sorted(sc['horizons'].keys()),
                        f'(tradingAge {ta})')

          # 4. Rebuild the running summary (overall + by posture + by VIX zone).
          # v3 score files contribute their 1D-horizon Layer1+Layer2 results to
          # the legacy aggregates so posture calibration keeps feeding; Layer 3
          # is EXCLUDED from those by design (high-noise, separate bucket).
          rawscores = [json.load(open(p)) for p in sorted(glob.glob('ledger/scores/*.json'))]
          v3scores = [s for s in rawscores if s.get('engine') == 'ledger-v3']

          def legacy_item(sc):
              h1 = (sc.get('horizons') or {}).get('1')
              if not h1:
                  return None
              parts = [h1['layer1']['sensors'], h1['layer1']['stocks'], h1['layer2']]
              n = sum(p['n'] for p in parts)
              hh = sum(p['hits'] for p in parts)
              wb = [(p['brierMean'], p['n']) for p in parts
                    if p.get('brierMean') is not None and p['n']]
              bm = sum(b * w for b, w in wb) / sum(w for _, w in wb) if wb else None
              return {'n': n, 'argmaxHits': hh, 'brierMean': bm,
                      'context': sc.get('context', {}),
                      'classes': h1.get('classes'),
                      'postureRow': h1.get('posture'),
                      'aiDirectional': h1.get('aiDirectional') or {'n': 0, 'hits': 0}}

          allscores = ([s for s in rawscores if s.get('engine') != 'ledger-v3'] +
                       [x for x in (legacy_item(s) for s in v3scores) if x])
          def agg(items):
              n = sum(s['n'] for s in items); h = sum(s['argmaxHits'] for s in items)
              wb = [(s['brierMean'], s['n']) for s in items if s.get('brierMean') is not None]
              bm = sum(b * w for b, w in wb) / sum(w for _, w in wb) if wb else None
              return {'days': len(items), 'n': n, 'hitRate': round(h / n, 3) if n else None,
                      'brierMean': round(bm, 4) if bm is not None else None}
          def agg_classes(items):
              cs = [s.get('classes') or {} for s in items]
              n = sum(c.get('n', 0) for c in cs); h = sum(c.get('hits', 0) for c in cs)
              wb = [(c['brierMean'], c['n']) for c in cs if c.get('brierMean') is not None and c.get('n')]
              bm = sum(b * w for b, w in wb) / sum(w for _, w in wb) if wb else None
              # Per-class accumulation — the actual learning table.
              per = {}
              for c in cs:
                  for r in c.get('rows', []):
                      e = per.setdefault(r['assetClass'], {'n': 0, 'hits': 0})
                      e['n'] += 1; e['hits'] += bool(r['hit'])
              for k, e in per.items():
                  e['hitRate'] = round(e['hits'] / e['n'], 3) if e['n'] else None
              return {'n': n, 'hits': h, 'hitRate': round(h / n, 3) if n else None,
                      'brierMean': round(bm, 4) if bm is not None else None, 'byClass': per}
          def agg_posture(items):
              ps = [s.get('postureRow') for s in items if s.get('postureRow')]
              by = {}
              for r in ps:
                  e = by.setdefault(r['posture'], {'n': 0, 'hits': 0})
                  e['n'] += 1; e['hits'] += bool(r['hit'])
              for k, e in by.items():
                  e['hitRate'] = round(e['hits'] / e['n'], 3) if e['n'] else None
              n = len(ps); h = sum(bool(r['hit']) for r in ps)
              return {'n': n, 'hits': h, 'hitRate': round(h / n, 3) if n else None, 'byPosture': by}
          by_posture, by_vix = {}, {}
          for s in allscores:
              by_posture.setdefault(s['context'].get('posture') or '?', []).append(s)
              by_vix.setdefault(s['context'].get('vixZone') or '?', []).append(s)
          ai_n = sum(s['aiDirectional']['n'] for s in allscores)
          ai_h = sum(s['aiDirectional']['hits'] for s in allscores)
          # ledger-v3: layer × horizon learning table (the new primary axis).
          def agg_block(blocks):
              blocks = [b for b in blocks if b]
              n = sum(b['n'] for b in blocks)
              hh = sum(b['hits'] for b in blocks)
              wb = [(b['brierMean'], b['n']) for b in blocks
                    if b.get('brierMean') is not None and b['n']]
              bm = sum(x * w for x, w in wb) / sum(w for _, w in wb) if wb else None
              per = {}
              for b in blocks:
                  for r in b.get('rows', []):
                      key = r.get('sensor') or r.get('symbol') or r.get('assetClass')
                      e = per.setdefault(key, {'n': 0, 'hits': 0})
                      e['n'] += 1
                      e['hits'] += bool(r['hit'])
              for k, e in per.items():
                  e['hitRate'] = round(e['hits'] / e['n'], 3) if e['n'] else None
              return {'n': n, 'hits': hh,
                      'hitRate': round(hh / n, 3) if n else None,
                      'brierMean': round(bm, 4) if bm is not None else None,
                      'byMember': per}

          layers = {}
          for lname in ('layer1', 'layer2', 'layer3'):
              byh = {}
              for hk in ('1', '3', '5'):
                  blocks, hdays = [], 0
                  for s in v3scores:
                      hb = (s.get('horizons') or {}).get(hk)
                      if not hb:
                          continue
                      hdays += 1
                      if lname == 'layer1':
                          blocks += [hb['layer1']['sensors'], hb['layer1']['stocks']]
                      else:
                          blocks.append(hb[lname])
                  a = agg_block(blocks)
                  a['days'] = hdays
                  byh[hk] = a
              layers[lname] = {'byHorizon': byh}

          summary = {
              'updated': today, 'engineVersion': 'ledger-v3',
              'overall': agg(allscores) if allscores else None,
              'byPosture': {k: agg(v) for k, v in by_posture.items()},
              'byVixZone': {k: agg(v) for k, v in by_vix.items()},
              'aiDirectional': {'n': ai_n, 'hits': ai_h,
                                'hitRate': round(ai_h / ai_n, 3) if ai_n else None},
              'classes': agg_classes(allscores),
              'posture': agg_posture(allscores),
              'layers': layers,
              'noteJa': 'シナリオ分布のargmax的中率とBrierスコア(低いほど良い)。v3: 3層×1/3/5営業日ホライズン(Layer1=固定16センサー・bandPct=資産種別の日次σ単位)。成績は分類の校正度であり、将来の利益を保証しない。',
          }
          json.dump(summary, open('ledger/summary.json', 'w'), ensure_ascii=False, indent=1)
          print('summary:', summary.get('overall'))
          PY

      - name: Commit to ledger branch
        run: |
          git config user.name "argus-ledger[bot]"
          git config user.email "argus-ledger@users.noreply.github.com"
          git add ledger/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "ledger: $(date -u +%F) record + score"
            git push origin HEAD:ledger
          fi

      # The ledger is ARGUS's memory — a silent failure would quietly stop the
      # learning loop. Push a phone alert if ANY step above failed (v10.3.1).
      - name: Notify on failure (skipped without NTFY_TOPIC)
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          curl -s --max-time 30 \
            -H "Title: ARGUS ledger FAILED" -H "Priority: high" -H "Tags: warning" \
            -H "Click: https://github.com/mitsugue/argus/actions/workflows/prediction-ledger.yml" \
            -d "予測台帳の記録/採点ワークフローが失敗しました。Actionsを確認してください。" \
            "https://ntfy.sh/$NTFY_TOPIC" > /dev/null || true
