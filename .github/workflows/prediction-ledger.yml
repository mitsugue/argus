# ARGUS Prediction Ledger — the self-scoring loop (v10.3).
#
# Every JP trading day at 16:05 JST:
#   1. (optional) trigger a fresh AI judgment run so AI views are recorded
#      (needs the ARGUS_ADMIN_TOKEN repo secret; skipped gracefully without it)
#   2. record today's falsifiable predictions  -> ledger/days/YYYY-MM-DD.json
#   3. score past unscored snapshots against realized moves
#                                              -> ledger/scores/YYYY-MM-DD.json
#   4. rebuild the running accuracy summary    -> ledger/summary.json
#
# Data lives on the `ledger` BRANCH (not main) so daily commits never trigger
# the Pages/Render deploys. The ledger covers the curated engine symbols and
# market context only — NO personal holdings ever.
# Scoring: realized next-session move vs the predicted scenario distribution
# (argmax hit + Brier score), recorded separately for the RULE engine and the
# AI views so their accuracy can be compared per market context over time.

name: prediction-ledger

on:
  schedule:
    - cron: '5 7 * * 1-5'   # 07:05 UTC = 16:05 JST Mon-Fri (after TSE close)
  workflow_dispatch:
    inputs:
      mode:
        description: 'full = 記録+採点(当日未記録のときのみ) / ai-only = AI実行+診断のみ(台帳に触らない) / force = 当日記録を強制上書き'
        required: false
        default: 'full'

permissions:
  contents: write

# Serialize every writer of the `ledger` branch (this workflow + vault-sync.yml)
# so two runs never push concurrently. cancel-in-progress:false = queue, don't
# kill — losing a half-done ledger run would be worse than waiting.
concurrency:
  group: ledger-branch-writer
  cancel-in-progress: false

jobs:
  # Dedupe gate (cron-reliability-v1): GitHub's free cron runs HOURS late, so
  # the punctual trigger is an external workflow_dispatch (user's EC2 at 16:05
  # JST). When the delayed schedule run finally fires after today was already
  # recorded, it must NOT re-run the AI / overwrite the close-pin record with
  # evening prices. Manual/external dispatch always proceeds.
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Skip if today is already recorded (unless ai-only/force)
        id: check
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "ai-only" ] || [ "$MODE" = "force" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"   # ai-only never touches the
            exit 0                                  # ledger; force is explicit
          fi
          TODAY=$(TZ=Asia/Tokyo date +%F)
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://raw.githubusercontent.com/mitsugue/argus/ledger/ledger/days/$TODAY.json?cb=$RANDOM")
          if [ "$CODE" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "today ($TODAY) already recorded — run exits (use mode=force to overwrite)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  record-and-score:
    needs: gate
    if: needs.gate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger AI judgment run (skipped without ARGUS_ADMIN_TOKEN secret)
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          if [ -z "$ARGUS_ADMIN_TOKEN" ]; then
            echo "::warning::ARGUS_ADMIN_TOKEN secret is EMPTY in this run — AI skipped"
            echo "🤖 AI: **secret missing** — rule-only predictions recorded" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "token present (length ${#ARGUS_ADMIN_TOKEN})"
          # Warm the dyno, then surface the gate state on the run page (the
          # security-status payload is booleans/limits only — no secrets).
          curl -s --max-time 90 "$BE/api/argus/rates" > /dev/null || true
          GATE=$(curl -s --max-time 60 -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" "$BE/api/argus/security-status" || echo '{"error":"unreachable"}')
          echo "gate: $GATE"
          echo "🔐 gate: \`${GATE}\`" >> "$GITHUB_STEP_SUMMARY"
          RESP=$(curl -s --max-time 240 -X POST \
            -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            "$BE/api/argus/ai-judgment/run" || echo '{"error":"unreachable"}')
          SHORT=$(echo "$RESP" | head -c 300)
          echo "ai run: $SHORT"
          echo "🤖 ai run: \`${SHORT}\`" >> "$GITHUB_STEP_SUMMARY"
          # Per-provider diagnostics (esp. WHY Gemini failed — lastErrorType is
          # an exception type + message head, never a key). Admin-gated source,
          # surfaced here so a failing checker is debuggable from the run page.
          DIAG=$(curl -s --max-time 60 -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            "$BE/api/argus/ai-provider-status" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          g = d.get('gemini') or {}; o = d.get('openai') or {}
          print(json.dumps({'openai': o.get('lastRunStatus'),
                            'gemini': g.get('lastRunStatus'),
                            'geminiError': g.get('lastErrorType')}, ensure_ascii=False))" \
            2>/dev/null || echo '{}')
          echo "🔬 provider diag: \`${DIAG}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Layer 2B daily run (owner watchlist — private store)
        if: github.event.inputs.mode != 'ai-only'
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          [ -z "$ARGUS_ADMIN_TOKEN" ] && { echo "no admin token — skip Layer 2B"; exit 0; }
          # Records today's owner predictions + scores due horizons into the
          # PRIVATE repo (no-op if the owner hasn't synced / private store unset).
          RESP=$(curl -s --max-time 120 -X POST -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            "$BE/api/argus/calibration/layer2b-run" || echo '{"error":"unreachable"}')
          echo "🗂️ Layer 2B: \`${RESP:0:200}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout ledger branch
        if: github.event.inputs.mode != 'ai-only'
        uses: actions/checkout@v5
        with:
          ref: main
      - name: Switch to ledger branch (create if missing)
        if: github.event.inputs.mode != 'ai-only'
        run: |
          # SAFETY (v10.59): NEVER orphan-wipe an existing ledger branch. The old
          # `fetch … && checkout || checkout --orphan` wiped ~133 records on 06-22
          # when the fetch hiccupped: the || fell through to an orphan branch built
          # from main's tree (no ledger history), which then replaced the branch.
          # Now we orphan ONLY when origin/ledger genuinely does not exist.
          git fetch origin "ledger:refs/remotes/origin/ledger" 2>/dev/null \
            || git fetch origin ledger 2>/dev/null || true
          if git rev-parse --verify refs/remotes/origin/ledger >/dev/null 2>&1; then
            git checkout -B ledger refs/remotes/origin/ledger     # full history
          elif git rev-parse --verify FETCH_HEAD >/dev/null 2>&1; then
            git checkout -B ledger FETCH_HEAD
          else
            echo "::warning::origin/ledger not found — creating a FRESH ledger branch (first run only)"
            git checkout --orphan ledger
            git rm -rq --cached . 2>/dev/null || true
            find . -maxdepth 1 ! -name ledger ! -name .git ! -name . -exec rm -rf {} + 2>/dev/null || true
            mkdir -p ledger/days ledger/scores
          fi
          test -f ledger/days/*.json 2>/dev/null \
            && echo "ledger branch ready: $(ls ledger/days | wc -l) day file(s)" \
            || echo "ledger branch ready: (no day files yet)"

      - name: Persist backup vault (client-side-encrypted envelopes)
        if: github.event.inputs.mode != 'ai-only'
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          if [ -z "$ARGUS_ADMIN_TOKEN" ]; then echo '{}' > vault.json; else
            curl -s --max-time 60 -X POST -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
              "$BE/api/argus/vault-pull" -o vault.json || echo '{}' > vault.json
          fi
          python3 - <<'PY'
          import json, os, glob, datetime
          slots = (json.load(open('vault.json')) or {}).get('slots') or {}
          for vid, slot in slots.items():
              if not (isinstance(vid, str) and len(vid) == 64 and all(c in '0123456789abcdef' for c in vid)):
                  continue
              d = f'ledger/vault/{vid}'
              os.makedirs(d, exist_ok=True)
              stamp = datetime.datetime.utcfromtimestamp(slot.get('ts', 0)).strftime('%Y-%m-%dT%H%M%SZ')
              open(f'{d}/{stamp}.json', 'w').write(slot['blob'])
              open(f'{d}/latest.json', 'w').write(slot['blob'])
              # Old backups are disposable (user-approved): keep the newest 8.
              hist = sorted(p for p in glob.glob(f'{d}/*.json') if not p.endswith('latest.json'))
              for old in hist[:-8]:
                  os.remove(old)
              print('vault saved:', vid[:12], stamp)
          if not slots:
              print('no pending vault envelopes')
          PY

      # ai-persist-v1: the public GET payload (no secrets) is committed to the
      # ledger branch so a restarted Render dyno can restore the latest real AI
      # view instead of showing "not run yet" all day.
      - name: Persist AI judgment for dyno-restart restore
        if: github.event.inputs.mode != 'ai-only'
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          curl -s --max-time 60 "$BE/api/argus/ai-judgment" -o ai.json || echo '{}' > ai.json
          python3 - <<'PY'
          import json, os
          try:
              d = json.load(open('ai.json'))
          except Exception:
              d = {}
          if isinstance(d, dict) and d.get('status') in ('live', 'partial') and d.get('labels'):
              os.makedirs('ledger/ai', exist_ok=True)
              json.dump(d, open('ledger/ai/latest.json', 'w'), ensure_ascii=False)
              print('AI judgment persisted:', d.get('status'), d.get('asOf'))
          else:
              s = d.get('status') if isinstance(d, dict) else '?'
              print(f'no live AI judgment to persist (status={s}) — previous file kept')
          PY

      # incident-replay-v1 (v10.108): snapshot the day's downside incidents to the
      # ledger branch so a sharp-drop day can be reviewed later (postmortem). Append-
      # only per date; calm days (no incidents) are skipped. Outcome scoring is a
      # later layer — this is the durable record it will read.
      - name: Persist downside incidents (replay history)
        if: github.event.inputs.mode != 'ai-only'
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          TODAY=$(TZ=Asia/Tokyo date +%F)
          curl -s --max-time 60 "$BE/api/argus/downside-incidents" -o ds.json || echo '{}' > ds.json
          python3 - "$TODAY" <<'PY'
          import json, os, sys
          today = sys.argv[1]
          try:
              d = json.load(open('ds.json'))
          except Exception:
              d = {}
          incs = d.get('incidents') or []
          if incs:
              os.makedirs('ledger/downside', exist_ok=True)
              rec = {'date': today, 'asOf': d.get('asOf'),
                     'globalRegime': d.get('globalRegime'), 'jpIntradayOverlay': d.get('jpIntradayOverlay'),
                     'holderRiskOverlay': d.get('holderRiskOverlay'), 'activeCount': d.get('activeCount'),
                     'incidents': [{k: i.get(k) for k in ('symbol','market','assetName','changePct',
                                    'incidentType','severity','actionOverride','isHeld','ownerState',
                                    'causeBuckets','reasonJa')} for i in incs]}
              # Append-only per date: never overwrite an existing day file.
              path = f'ledger/downside/{today}.json'
              if not os.path.exists(path):
                  json.dump(rec, open(path, 'w'), ensure_ascii=False, indent=1)
              json.dump(rec, open('ledger/downside/latest.json', 'w'), ensure_ascii=False, indent=1)
              print(f'downside incidents persisted: {today} ({len(incs)})')
          else:
              print('no downside incidents today — nothing to persist')
          PY

      # rotation-history-v1 (v10.109): snapshot the day's capital-rotation reading
      # (group scores + top rotations) to the ledger branch so Δ-from-last-reading
      # ("where did money leave?") can be shown later. Append-only per date; only
      # when the regime read is live/partial (a mock/empty read is skipped).
      - name: Persist capital-rotation reading (history)
        if: github.event.inputs.mode != 'ai-only'
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          TODAY=$(TZ=Asia/Tokyo date +%F)
          curl -s --max-time 60 "$BE/api/argus/market-regime" -o reg.json || echo '{}' > reg.json
          python3 - "$TODAY" <<'PY'
          import json, os, sys
          today = sys.argv[1]
          try:
              d = json.load(open('reg.json'))
          except Exception:
              d = {}
          if isinstance(d, dict) and d.get('status') in ('live', 'partial') and not d.get('heldOverMin'):
              os.makedirs('ledger/rotations', exist_ok=True)
              rec = {'date': today, 'asOf': d.get('asOf'),
                     'regime': (d.get('regime') or {}).get('label'),
                     'groups': [{'id': g.get('id'), 'label': g.get('label'), 'role': g.get('role'),
                                 'score': g.get('score'), 'status': g.get('status')}
                                for g in (d.get('rotationGroups') or []) if g.get('available')],
                     'topRotations': d.get('topRotations') or []}
              path = f'ledger/rotations/{today}.json'
              if not os.path.exists(path):   # append-only: never overwrite a recorded day
                  json.dump(rec, open(path, 'w'), ensure_ascii=False, indent=1)
              json.dump(rec, open('ledger/rotations/latest.json', 'w'), ensure_ascii=False, indent=1)
              print(f'rotation reading persisted: {today} ({len(rec["groups"])} groups)')
          else:
              st = d.get('status') if isinstance(d, dict) else '?'
              print(f'rotation reading not persisted (status={st}, held={bool(d.get("heldOverMin"))})')
          PY

      # ai-cost-persist (v10.50): the month-to-date AI spend (no prompts/keys) is
      # committed so the ARGUS-side HARD budget stop survives a dyno restart. The
      # server restores max(persisted, in-memory) on boot. Admin-token gated.
      - name: Persist AI cost ledger (monthly hard-stop baseline)
        if: github.event.inputs.mode != 'ai-only'
        env:
          ARGUS_ADMIN_TOKEN: ${{ secrets.ARGUS_ADMIN_TOKEN }}
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          [ -z "$ARGUS_ADMIN_TOKEN" ] && { echo "no admin token — skip cost persist"; exit 0; }
          curl -s --max-time 60 -H "X-ARGUS-ADMIN-TOKEN: $ARGUS_ADMIN_TOKEN" \
            "$BE/api/argus/ai-cost" -o aicost.json || echo '{}' > aicost.json
          python3 - <<'PY'
          import json, os
          try:
              d = json.load(open('aicost.json'))
          except Exception:
              d = {}
          m = d.get('month'); spent = d.get('monthSpentUsd')
          if isinstance(m, str) and isinstance(spent, (int, float)):
              os.makedirs('ledger/ai-cost', exist_ok=True)
              path = f'ledger/ai-cost/{m}.json'
              prev = 0.0
              if os.path.exists(path):
                  try: prev = float(json.load(open(path)).get('monthSpentUsd') or 0.0)
                  except Exception: prev = 0.0
              # Monotonic within a month: never let a mid-month restart lower it.
              d['monthSpentUsd'] = max(prev, float(spent))
              json.dump(d, open(path, 'w'), ensure_ascii=False, indent=1)
              print(f'AI cost persisted {m}: ${d["monthSpentUsd"]:.4f}')
          else:
              print('no AI cost to persist (admin gate / no run)')
          PY

      - name: Record today's predictions + score the past
        if: github.event.inputs.mode != 'ai-only'
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          for i in 1 2 3 4 5 6; do
            curl -sf --max-time 60 "$BE/api/argus/prediction-snapshot" -o snap.json && break
            echo "retry $i"; sleep 20
          done
          test -s snap.json
          curl -sf --max-time 60 "$BE/api/argus/japan-watchlist" -o jp.json || echo '{}' > jp.json
          curl -sf --max-time 60 "$BE/api/argus/us-watchlist"   -o us.json || echo '{}' > us.json
          curl -sf --max-time 90 "$BE/api/argus/class-quotes"    -o cls.json || echo '{}' > cls.json
          curl -sf --max-time 90 "$BE/api/argus/sensor-quotes"   -o sens.json || echo '{}' > sens.json
          curl -sf --max-time 60 "$BE/api/argus/crypto-watchlist" -o cw.json || echo '{}' > cw.json
          python3 - <<'PY'
          import json, os, glob, datetime

          snap = json.load(open('snap.json'))
          today = snap['dateJst']
          os.makedirs('ledger/days', exist_ok=True)
          os.makedirs('ledger/scores', exist_ok=True)

          # 1. Record today's snapshot (idempotent — last run of the day wins).
          json.dump(snap, open(f'ledger/days/{today}.json', 'w'),
                    ensure_ascii=False, indent=1)
          print('recorded', today, len(snap['predictions']), 'predictions')

          # 2. Current live prices for scoring (stocks + class proxies + crypto).
          now_price = {}
          for f in ('jp.json', 'us.json'):
              for s in (json.load(open(f)).get('stocks') or []):
                  if s.get('status') == 'live':
                      now_price[s['symbol']] = float(s['price'])
          cls_price = {sym: q['price'] for sym, q in
                       ((json.load(open('cls.json')).get('quotes')) or {}).items()}
          for q in (json.load(open('cw.json')).get('quotes') or []):
              if q.get('status') == 'live':
                  cls_price[q['id']] = float(q['priceUsd'])

          def bucket(pct):
              if pct < -2: return 'downside_continuation'
              if pct > 2:  return 'rebound_attempt'
              return 'sideways_stabilization'

          DIRECTIONAL = {'BUY DIP': 'up', 'ADD': 'up', 'TRIM': 'down', 'EXIT': 'down'}

          # 3. Score unscored snapshots that are 1..7 days old.
          for path in sorted(glob.glob('ledger/days/*.json')):
              d = os.path.basename(path)[:-5]
              if d >= today: continue
              spath = f'ledger/scores/{d}.json'
              if os.path.exists(spath): continue
              age = (datetime.date.fromisoformat(today) - datetime.date.fromisoformat(d)).days
              if age > 7: continue
              day = json.load(open(path))
              if day.get('engineVersion') == 'ledger-v3': continue  # scored by the v3 loop below
              rows, hits, briers = [], 0, []
              ai_hits, ai_total = 0, 0
              for p in day.get('predictions', []):
                  cur = now_price.get(p['symbol'])
                  if cur is None or not p.get('price'): continue
                  realized = (cur / p['price'] - 1) * 100
                  b = bucket(realized)
                  probs = {s['label']: s['p'] / 100 for s in p['scenarios']}
                  argmax = max(probs, key=lambda k: probs[k])
                  hit = (argmax == b)
                  brier = sum((probs.get(k, 0) - (1.0 if k == b else 0.0)) ** 2
                              for k in ('downside_continuation', 'sideways_stabilization', 'rebound_attempt'))
                  hits += hit; briers.append(brier)
                  ai = p.get('ai') or {}
                  ai_dir = DIRECTIONAL.get(ai.get('action') or '')
                  ai_hit = None
                  if ai_dir:
                      ai_total += 1
                      ai_hit = (ai_dir == 'up' and realized > 0) or (ai_dir == 'down' and realized < 0)
                      ai_hits += bool(ai_hit)
                  rows.append({'symbol': p['symbol'], 'predPrice': p['price'], 'curPrice': cur,
                               'realizedPct': round(realized, 2), 'bucket': b,
                               'argmax': argmax, 'hit': hit, 'brier': round(brier, 4),
                               'action': p['action'], 'aiAction': ai.get('action'),
                               'aiDirectionalHit': ai_hit})
              # Asset-class predictions (ledger-v2): same buckets/metrics.
              crows, chits, cbriers = [], 0, []
              for p in day.get('classPredictions', []):
                  cur = cls_price.get(p['symbol'])
                  if cur is None or not p.get('price'): continue
                  realized = (cur / p['price'] - 1) * 100
                  b = bucket(realized)
                  probs = {s['label']: s['p'] / 100 for s in p['scenarios']}
                  argmax = max(probs, key=lambda k: probs[k])
                  hit = (argmax == b)
                  brier = sum((probs.get(k, 0) - (1.0 if k == b else 0.0)) ** 2
                              for k in ('downside_continuation', 'sideways_stabilization', 'rebound_attempt'))
                  chits += hit; cbriers.append(brier)
                  crows.append({'assetClass': p['assetClass'], 'symbol': p['symbol'],
                                'realizedPct': round(realized, 2), 'bucket': b,
                                'argmax': argmax, 'hit': hit, 'brier': round(brier, 4)})
              # Posture call: graded by its own self-describing rule vs SPY.
              posture_row = None
              pp = day.get('posturePrediction')
              if pp and pp.get('rule') and cls_price.get(pp.get('proxy', 'SPY')):
                  move = (cls_price[pp['proxy']] / pp['price'] - 1) * 100
                  r = pp['rule']
                  ok = ((move > 0) if (r['type'] == 'direction' and r['sign'] > 0) else
                        (move < 0) if (r['type'] == 'direction') else
                        (abs(move) >= r.get('minPct', 1.0)))
                  posture_row = {'posture': pp['posture'], 'movePct': round(move, 2), 'hit': bool(ok)}
              if not rows and not crows and not posture_row: continue
              score = {'date': d, 'scoredOn': today, 'ageDays': age,
                       'context': day.get('context', {}),
                       'n': len(rows), 'argmaxHits': hits,
                       'hitRate': round(hits / len(rows), 3) if rows else None,
                       'brierMean': round(sum(briers) / len(briers), 4) if briers else None,
                       'aiDirectional': {'n': ai_total, 'hits': ai_hits},
                       'classes': {'n': len(crows), 'hits': chits,
                                   'hitRate': round(chits / len(crows), 3) if crows else None,
                                   'brierMean': round(sum(cbriers) / len(cbriers), 4) if cbriers else None,
                                   'rows': crows},
                       'postureRow': posture_row,
                       'rows': rows}
              json.dump(score, open(spath, 'w'), ensure_ascii=False, indent=1)
              print('scored', d, f"hit {hits}/{len(rows)} brier {score['brierMean']}")

          # 3b. ledger-v3 (decided 2026-06-11): layer-separated scoring at
          # 1/3/5 TRADING-day horizons. Layer 1 = the fixed 16 sensors
          # (scored vs /sensor-quotes, per-row bandPct buckets); tactical
          # stock rows split by their .layer field; Layer 3 never mixes into
          # Layer-1 stats. A day's score file fills horizon slots
          # progressively across runs (re-opened until all horizons done).
          sens_now = (json.load(open('sens.json')).get('quotes') or {})

          def tdays(d0, d1):
              n = 0
              c = datetime.date.fromisoformat(d0)
              end = datetime.date.fromisoformat(d1)
              while c < end:
                  c += datetime.timedelta(days=1)
                  if c.weekday() < 5:
                      n += 1
              return n

          def score_rows(pred_rows, price_of, key_field):
              rows, hits, briers = [], 0, []
              for p in pred_rows:
                  cur = price_of(p)
                  if cur is None or not p.get('price'):
                      continue
                  realized = (cur / p['price'] - 1) * 100
                  band = float(p.get('bandPct') or 2.0)
                  b = ('downside_continuation' if realized < -band else
                       'rebound_attempt' if realized > band else 'sideways_stabilization')
                  probs = {s['label']: s['p'] / 100 for s in p['scenarios']}
                  argmax = max(probs, key=lambda k: probs[k])
                  hit = (argmax == b)
                  brier = sum((probs.get(k, 0) - (1.0 if k == b else 0.0)) ** 2 for k in probs)
                  hits += hit
                  briers.append(brier)
                  rows.append({key_field: p.get(key_field) or p.get('symbol'),
                               'realizedPct': round(realized, 2), 'bucket': b,
                               'argmax': argmax, 'hit': hit, 'brier': round(brier, 4)})
              return {'n': len(rows), 'hits': hits,
                      'hitRate': round(hits / len(rows), 3) if rows else None,
                      'brierMean': round(sum(briers) / len(briers), 4) if briers else None,
                      'rows': rows}

          HORIZONS = (1, 3, 5)
          for path in sorted(glob.glob('ledger/days/*.json')):
              d = os.path.basename(path)[:-5]
              if d >= today:
                  continue
              day = json.load(open(path))
              if day.get('engineVersion') != 'ledger-v3':
                  continue
              cal_age = (datetime.date.fromisoformat(today) - datetime.date.fromisoformat(d)).days
              if cal_age > 14:
                  continue
              ta = tdays(d, today)
              spath = f'ledger/scores/{d}.json'
              sc = {'date': d, 'engine': 'ledger-v3',
                    'context': day.get('context', {}), 'horizons': {}}
              if os.path.exists(spath):
                  prev = json.load(open(spath))
                  if prev.get('engine') == 'ledger-v3':
                      sc = prev
              if all(str(h) in sc['horizons'] for h in HORIZONS):
                  continue
              stock_price = lambda p: now_price.get(p['symbol'])
              preds = day.get('predictions') or []
              changed = False
              for h in HORIZONS:
                  hk = str(h)
                  if hk in sc['horizons'] or ta < h:
                      continue
                  block = {
                      'scoredOn': today, 'tradingAge': ta,
                      'layer1': {
                          'sensors': score_rows(day.get('sensors') or [],
                                                lambda p: sens_now.get(p.get('sensor')), 'sensor'),
                          'stocks': score_rows([p for p in preds if p.get('layer') == 1],
                                               stock_price, 'symbol'),
                      },
                      'layer2': score_rows([p for p in preds if p.get('layer', 2) == 2],
                                           stock_price, 'symbol'),
                      'layer3': score_rows([p for p in preds if p.get('layer') == 3],
                                           stock_price, 'symbol'),
                  }
                  if h == 1:
                      # Legacy-continuity sections live on the 1D horizon: the
                      # class proxies, AI directional grading and the posture call.
                      block['classes'] = score_rows(day.get('classPredictions') or [],
                                                    lambda p: cls_price.get(p['symbol']), 'assetClass')
                      ai_total = ai_hits = 0
                      for p in preds:
                          cur = now_price.get(p['symbol'])
                          ai_dir = DIRECTIONAL.get(((p.get('ai') or {}).get('action')) or '')
                          if cur is None or not p.get('price') or not ai_dir:
                              continue
                          realized = (cur / p['price'] - 1) * 100
                          ai_total += 1
                          ai_hits += bool((ai_dir == 'up' and realized > 0) or
                                          (ai_dir == 'down' and realized < 0))
                      block['aiDirectional'] = {'n': ai_total, 'hits': ai_hits}
                      pp = day.get('posturePrediction')
                      spy_now = sens_now.get('SPY') or cls_price.get('SPY')
                      if pp and pp.get('rule') and spy_now and pp.get('price'):
                          move = (spy_now / pp['price'] - 1) * 100
                          r = pp['rule']
                          ok = ((move > 0) if (r['type'] == 'direction' and r['sign'] > 0) else
                                (move < 0) if (r['type'] == 'direction') else
                                (abs(move) >= r.get('minPct', 1.0)))
                          block['posture'] = {'posture': pp['posture'],
                                              'movePct': round(move, 2), 'hit': bool(ok)}
                  sc['horizons'][hk] = block
                  changed = True
              if changed:
                  json.dump(sc, open(spath, 'w'), ensure_ascii=False, indent=1)
                  print('scored-v3', d, 'horizons', sorted(sc['horizons'].keys()),
                        f'(tradingAge {ta})')

          # 4. Rebuild the running summary (overall + by posture + by VIX zone).
          # v3 score files contribute their 1D-horizon Layer1+Layer2 results to
          # the legacy aggregates so posture calibration keeps feeding; Layer 3
          # is EXCLUDED from those by design (high-noise, separate bucket).
          rawscores = [json.load(open(p)) for p in sorted(glob.glob('ledger/scores/*.json'))]
          v3scores = [s for s in rawscores if s.get('engine') == 'ledger-v3']

          def legacy_item(sc):
              h1 = (sc.get('horizons') or {}).get('1')
              if not h1:
                  return None
              parts = [h1['layer1']['sensors'], h1['layer1']['stocks'], h1['layer2']]
              n = sum(p['n'] for p in parts)
              hh = sum(p['hits'] for p in parts)
              wb = [(p['brierMean'], p['n']) for p in parts
                    if p.get('brierMean') is not None and p['n']]
              bm = sum(b * w for b, w in wb) / sum(w for _, w in wb) if wb else None
              return {'n': n, 'argmaxHits': hh, 'brierMean': bm,
                      'context': sc.get('context', {}),
                      'classes': h1.get('classes'),
                      'postureRow': h1.get('posture'),
                      'aiDirectional': h1.get('aiDirectional') or {'n': 0, 'hits': 0}}

          allscores = ([s for s in rawscores if s.get('engine') != 'ledger-v3'] +
                       [x for x in (legacy_item(s) for s in v3scores) if x])
          def agg(items):
              n = sum(s['n'] for s in items); h = sum(s['argmaxHits'] for s in items)
              wb = [(s['brierMean'], s['n']) for s in items if s.get('brierMean') is not None]
              bm = sum(b * w for b, w in wb) / sum(w for _, w in wb) if wb else None
              return {'days': len(items), 'n': n, 'hitRate': round(h / n, 3) if n else None,
                      'brierMean': round(bm, 4) if bm is not None else None}
          def agg_classes(items):
              cs = [s.get('classes') or {} for s in items]
              n = sum(c.get('n', 0) for c in cs); h = sum(c.get('hits', 0) for c in cs)
              wb = [(c['brierMean'], c['n']) for c in cs if c.get('brierMean') is not None and c.get('n')]
              bm = sum(b * w for b, w in wb) / sum(w for _, w in wb) if wb else None
              # Per-class accumulation — the actual learning table.
              per = {}
              for c in cs:
                  for r in c.get('rows', []):
                      e = per.setdefault(r['assetClass'], {'n': 0, 'hits': 0})
                      e['n'] += 1; e['hits'] += bool(r['hit'])
              for k, e in per.items():
                  e['hitRate'] = round(e['hits'] / e['n'], 3) if e['n'] else None
              return {'n': n, 'hits': h, 'hitRate': round(h / n, 3) if n else None,
                      'brierMean': round(bm, 4) if bm is not None else None, 'byClass': per}
          def agg_posture(items):
              ps = [s.get('postureRow') for s in items if s.get('postureRow')]
              by = {}
              for r in ps:
                  e = by.setdefault(r['posture'], {'n': 0, 'hits': 0})
                  e['n'] += 1; e['hits'] += bool(r['hit'])
              for k, e in by.items():
                  e['hitRate'] = round(e['hits'] / e['n'], 3) if e['n'] else None
              n = len(ps); h = sum(bool(r['hit']) for r in ps)
              return {'n': n, 'hits': h, 'hitRate': round(h / n, 3) if n else None, 'byPosture': by}
          by_posture, by_vix = {}, {}
          for s in allscores:
              by_posture.setdefault(s['context'].get('posture') or '?', []).append(s)
              by_vix.setdefault(s['context'].get('vixZone') or '?', []).append(s)
          ai_n = sum(s['aiDirectional']['n'] for s in allscores)
          ai_h = sum(s['aiDirectional']['hits'] for s in allscores)
          # ledger-v3: layer × horizon learning table (the new primary axis).
          def agg_block(blocks):
              blocks = [b for b in blocks if b]
              n = sum(b['n'] for b in blocks)
              hh = sum(b['hits'] for b in blocks)
              wb = [(b['brierMean'], b['n']) for b in blocks
                    if b.get('brierMean') is not None and b['n']]
              bm = sum(x * w for x, w in wb) / sum(w for _, w in wb) if wb else None
              per = {}
              for b in blocks:
                  for r in b.get('rows', []):
                      key = r.get('sensor') or r.get('symbol') or r.get('assetClass')
                      e = per.setdefault(key, {'n': 0, 'hits': 0})
                      e['n'] += 1
                      e['hits'] += bool(r['hit'])
              for k, e in per.items():
                  e['hitRate'] = round(e['hits'] / e['n'], 3) if e['n'] else None
              return {'n': n, 'hits': hh,
                      'hitRate': round(hh / n, 3) if n else None,
                      'brierMean': round(bm, 4) if bm is not None else None,
                      'byMember': per}

          layers = {}
          for lname in ('layer1', 'layer2', 'layer3'):
              byh = {}
              for hk in ('1', '3', '5'):
                  blocks, hdays = [], 0
                  for s in v3scores:
                      hb = (s.get('horizons') or {}).get(hk)
                      if not hb:
                          continue
                      hdays += 1
                      if lname == 'layer1':
                          blocks += [hb['layer1']['sensors'], hb['layer1']['stocks']]
                      else:
                          blocks.append(hb[lname])
                  a = agg_block(blocks)
                  a['days'] = hdays
                  byh[hk] = a
              layers[lname] = {'byHorizon': byh}

          summary = {
              'updated': today, 'engineVersion': 'ledger-v3',
              'overall': agg(allscores) if allscores else None,
              'byPosture': {k: agg(v) for k, v in by_posture.items()},
              'byVixZone': {k: agg(v) for k, v in by_vix.items()},
              'aiDirectional': {'n': ai_n, 'hits': ai_h,
                                'hitRate': round(ai_h / ai_n, 3) if ai_n else None},
              'classes': agg_classes(allscores),
              'posture': agg_posture(allscores),
              'layers': layers,
              'noteJa': 'シナリオ分布のargmax的中率とBrierスコア(低いほど良い)。v3: 3層×1/3/5営業日ホライズン(Layer1=固定16センサー・bandPct=資産種別の日次σ単位)。成績は分類の校正度であり、将来の利益を保証しない。',
          }
          json.dump(summary, open('ledger/summary.json', 'w'), ensure_ascii=False, indent=1)
          print('summary:', summary.get('overall'))
          PY

      # closepin-v1: score today's 14:30 pin against the actual 15:30 close
      # (same-day feedback). Close prices come from the moomoo bridge, which
      # keeps pushing the final price after the cash close — rows whose quote
      # is not a fresh same-day moomoo price are left unscored (honesty over
      # coverage: a T-1 J-Quants value is NOT today's close at 16:05).
      - name: Score today's close pin
        if: github.event.inputs.mode != 'ai-only'
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          TODAY=$(TZ=Asia/Tokyo date +%F)
          PIN="ledger/closepin/days/$TODAY.json"
          SCORE="ledger/closepin/scores/$TODAY.json"
          if [ ! -s "$PIN" ]; then echo "no pin today — nothing to score"; exit 0; fi
          if [ -s "$SCORE" ]; then echo "already scored today"; exit 0; fi
          SYMS=$(python3 -c "import json;print(','.join(r['symbol'] for r in json.load(open('$PIN'))['rows']))")
          curl -sf --max-time 90 "$BE/api/argus/japan-watchlist?symbols=$SYMS" -o close.json || echo '{}' > close.json
          python3 - <<'PY'
          import json, os, glob
          today = os.popen("TZ=Asia/Tokyo date +%F").read().strip()
          pin = json.load(open(f'ledger/closepin/days/{today}.json'))
          os.makedirs('ledger/closepin/scores', exist_ok=True)   # first-ever score: dir may not exist yet
          closes = {}
          try:
              for q in (json.load(open('close.json')).get('stocks') or []):
                  if q.get('source') == 'moomoo-rt' and q.get('date') == today:
                      closes[q['symbol']] = q.get('price')
          except Exception:
              pass
          flat_b, strong_b = (pin.get('scoringRule', {}).get('buckets', {}).get('flatWithinPct', 0.25),
                              pin.get('scoringRule', {}).get('buckets', {}).get('strongBeyondPct', 0.8))
          LABELS = ['strongDown', 'down', 'flat', 'up', 'strongUp']
          def bucket(pct):
              if pct <= -strong_b: return 'strongDown'
              if pct <= -flat_b:   return 'down'
              if pct <  flat_b:    return 'flat'
              if pct <  strong_b:  return 'up'
              return 'strongUp'
          rows, hits, briers = [], 0, []
          for r in pin.get('rows') or []:
              close = closes.get(r['symbol'])
              if not close or not r.get('pinPrice'):
                  rows.append({'symbol': r['symbol'], 'layer': r.get('layer'), 'scored': False})
                  continue
              pct = (close - r['pinPrice']) / r['pinPrice'] * 100.0
              b = bucket(pct)
              sc = r.get('scenarios') or {}
              pred = max(sc, key=sc.get) if sc else None
              hit = (pred == b)
              brier = sum((sc.get(l, 0) - (1.0 if l == b else 0.0)) ** 2 for l in LABELS)
              rows.append({'symbol': r['symbol'], 'layer': r.get('layer'), 'scored': True,
                           'closePct': round(pct, 3), 'bucket': b, 'predicted': pred,
                           'hit': hit, 'brier': round(brier, 4)})
              hits += hit; briers.append(brier)
          n = sum(1 for r in rows if r.get('scored'))
          out = {'date': today, 'engineVersion': 'closepin-v1',
                 'posture': pin.get('marketPosture'), 'n': n, 'hits': hits,
                 'hitRate': round(hits / n, 3) if n else None,
                 'brierMean': round(sum(briers) / n, 4) if n else None, 'rows': rows}
          json.dump(out, open(f'ledger/closepin/scores/{today}.json', 'w'), ensure_ascii=False, indent=1)
          # Running summary: overall + byPosture + byLayer + byMember.
          allsc = [json.load(open(p)) for p in sorted(glob.glob('ledger/closepin/scores/*.json'))]
          def agg(items):
              n = sum(s['n'] for s in items); h = sum(s['hits'] for s in items)
              wb = [(s['brierMean'], s['n']) for s in items if s.get('brierMean') is not None]
              bm = sum(b * w for b, w in wb) / sum(w for _, w in wb) if wb else None
              return {'days': len(items), 'n': n, 'hitRate': round(h / n, 3) if n else None,
                      'brierMean': round(bm, 4) if bm is not None else None}
          by_p, by_l, by_m = {}, {}, {}
          for s in allsc:
              by_p.setdefault(s.get('posture') or '?', []).append(s)
              for r in s.get('rows') or []:
                  if not r.get('scored'): continue
                  e = by_l.setdefault(str(r.get('layer')), {'n': 0, 'hits': 0})
                  e['n'] += 1; e['hits'] += bool(r['hit'])
                  m = by_m.setdefault(r['symbol'], {'n': 0, 'hits': 0})
                  m['n'] += 1; m['hits'] += bool(r['hit'])
          for d in (by_l, by_m):
              for e in d.values():
                  e['hitRate'] = round(e['hits'] / e['n'], 3) if e['n'] else None
          summary = {'updated': today, 'engineVersion': 'closepin-v1',
                     'overall': agg(allsc) if allsc else None,
                     'byPosture': {k: agg(v) for k, v in by_p.items()},
                     'byLayer': by_l, 'byMember': by_m,
                     'noteJa': '14:30ピン vs 同日15:30終値のバケット採点。リアルタイム価格が取れた行のみ。日次台帳とは独立の系統。'}
          json.dump(summary, open('ledger/closepin/summary.json', 'w'), ensure_ascii=False, indent=1)
          print(f"closepin scored: n={n} hits={hits}")
          PY

      # scout-ledger-v1 (Phase 3): record today's entry-scout scores + flow
      # classifications, then score past days vs the realized move so estimates
      # become calibrated hit rates. JP active names; realized prices from the
      # bridge/J-Quants watchlist.
      - name: Record + score entry-scout (calibration)
        if: github.event.inputs.mode != 'ai-only'
        run: |
          BE="https://argus-backend-3j2m.onrender.com"
          curl -sf --max-time 90 "$BE/api/argus/scout-batch" -o scout.json || echo '{}' > scout.json
          curl -sf --max-time 60 "$BE/api/argus/japan-watchlist" -o sjp.json || echo '{}' > sjp.json
          python3 - <<'PY'
          import json, os, glob, datetime
          try:
              sb = json.load(open('scout.json'))
          except Exception:
              sb = {}
          recs = sb.get('records') or []
          if not recs:
              print('no scout records — skip'); raise SystemExit(0)
          today = sb.get('dateJst') or datetime.datetime.now().strftime('%Y-%m-%d')
          os.makedirs('ledger/scout/days', exist_ok=True)
          json.dump(sb, open(f'ledger/scout/days/{today}.json', 'w'), ensure_ascii=False, indent=1)
          # realized prices now (bridge realtime or J-Quants close)
          now_px = {}
          try:
              for s in (json.load(open('sjp.json')).get('stocks') or []):
                  if s.get('status') == 'live':
                      now_px[s['symbol']] = float(s['price'])
          except Exception:
              pass
          # score scout days that are ~1 and ~5 trading days old
          days = sorted(glob.glob('ledger/scout/days/*.json'))
          dates = [os.path.basename(p)[:-5] for p in days]
          def trading_gap(idx_from_end):
              # position of a past file relative to today's list
              return idx_from_end
          # Build per-record forward returns by matching symbols across files.
          # Simple approach: for each past day, forward return = now_px vs that
          # day's lastClose (horizon ≈ days between then and now in file count).
          summary = {'updated': today, 'engineVersion': 'scout-ledger-v1',
                     'byBucket': {}, 'byFlowClass': {}, 'n': 0,
                     'noteJa': 'entry-scoutのスコア/フロー分類を実現リターンで採点。scoreが高い局面ほど上がったか、'
                               '買い戻し主導と推定した時に失速したか等を蓄積(校正)。最低20件貯まるまで参考。'}
          bucket = {}; flowc = {}
          for p in days[:-1]:                      # exclude today (no outcome yet)
              dd = os.path.basename(p)[:-5]
              age = len(days) - 1 - days.index(p)  # trading-day-ish age
              if age < 1 or age > 7:
                  continue
              try:
                  rj = json.load(open(p))
              except Exception:
                  continue
              for r in rj.get('records') or []:
                  sym = r.get('symbol'); base = r.get('lastClose')
                  px = now_px.get(sym)
                  if not sym or not base or not px:
                      continue
                  fwd = (px - base) / base * 100.0
                  b = r.get('bucket') or 'neutral'
                  e = bucket.setdefault(b, {'n': 0, 'sumRet': 0.0, 'up': 0})
                  e['n'] += 1; e['sumRet'] += fwd; e['up'] += (fwd > 0)
                  fc = r.get('flowClass') or 'UNCONFIRMED'
                  f = flowc.setdefault(fc, {'n': 0, 'sumRet': 0.0, 'up': 0})
                  f['n'] += 1; f['sumRet'] += fwd; f['up'] += (fwd > 0)
                  summary['n'] += 1
          for b, e in bucket.items():
              e['avgRetPct'] = round(e['sumRet'] / e['n'], 2) if e['n'] else None
              e['upRate'] = round(e['up'] / e['n'], 3) if e['n'] else None
              del e['sumRet']
          for fc, f in flowc.items():
              f['avgRetPct'] = round(f['sumRet'] / f['n'], 2) if f['n'] else None
              f['upRate'] = round(f['up'] / f['n'], 3) if f['n'] else None
              del f['sumRet']
          summary['byBucket'] = bucket
          summary['byFlowClass'] = flowc
          json.dump(summary, open('ledger/scout/summary.json', 'w'), ensure_ascii=False, indent=1)
          print(f"scout recorded {today} ({len(recs)} names); scored n={summary['n']}")
          PY

      - name: Calibration v4 dry-run (parallel epoch — never touches v3)
        if: github.event.inputs.mode != 'ai-only'
        run: |
          # Pure scorer modules from main (raw GitHub — no git-ref dependency).
          # They land at the repo root as UNTRACKED files; the commit below only
          # does `git add ledger/`, so they are never committed. The dry-run
          # writes ONLY to ledger/calibration_v1/ — v3 (ledger/days, ledger/
          # scores, ledger/summary.json) is never touched.
          for f in argus_calibration.py argus_ledger_v4.py argus_v4_dryrun.py; do
            curl -fsSL -o "$f" "https://raw.githubusercontent.com/mitsugue/argus/main/$f" || true
          done
          if [ -s snap.json ] && [ -f argus_v4_dryrun.py ]; then
            python3 argus_v4_dryrun.py snap.json ledger/calibration_v1 \
              && echo "v4 dry-run ok" >> "$GITHUB_STEP_SUMMARY" \
              || echo "::warning::v4 dry-run failed (non-fatal — v3 unaffected)"
          else
            echo "no snap.json — skip v4 dry-run"
          fi

      - name: Commit to ledger branch
        if: github.event.inputs.mode != 'ai-only'
        run: |
          git config user.name "argus-ledger[bot]"
          git config user.email "argus-ledger@users.noreply.github.com"
          git add ledger/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "ledger: $(date -u +%F) record + score"
            git push origin HEAD:ledger
          fi

      # The ledger is ARGUS's memory — a silent failure would quietly stop the
      # learning loop. Push a phone alert if ANY step above failed (v10.3.1).
      - name: Notify on failure (skipped without NTFY_TOPIC)
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          [ -z "$NTFY_TOPIC" ] && exit 0
          curl -s --max-time 30 \
            -H "Title: ARGUS ledger FAILED" -H "Priority: high" -H "Tags: warning" \
            -H "Click: https://github.com/mitsugue/argus/actions/workflows/prediction-ledger.yml" \
            -d "予測台帳の記録/採点ワークフローが失敗しました。Actionsを確認してください。" \
            "https://ntfy.sh/$NTFY_TOPIC" > /dev/null || true
