<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- v7 app icon (512) — calm minimal eye + A.R.G.U.S. wordmark + tagline.
       Palette inherits the app: bg #0B1118, text-main #E6EDF3,
       text-sub #8B98A7, text-muted #5F6B78, blue accent #60A5FA. -->
  <rect width="512" height="512" rx="96" fill="#0B1118"/>

  <!-- Eye -->
  <circle cx="256" cy="220" r="120" fill="none" stroke="#8B98A7" stroke-width="5" stroke-opacity="0.75"/>
  <circle cx="256" cy="220" r="64"  fill="none" stroke="#5F6B78" stroke-width="3" stroke-opacity="0.6"/>
  <circle cx="256" cy="220" r="22"  fill="#60A5FA"/>

  <!-- Argus motif — 4 quiet satellite eyes at cardinal points. -->
  <circle cx="256" cy="60"  r="6" fill="#5F6B78"/>
  <circle cx="256" cy="380" r="6" fill="#5F6B78"/>
  <circle cx="96"  cy="220" r="6" fill="#5F6B78"/>
  <circle cx="416" cy="220" r="6" fill="#5F6B78"/>

  <!-- Wordmark — Inter, no neon. -->
  <text x="256" y="450" text-anchor="middle"
        fill="#E6EDF3"
        font-family="Inter, 'Noto Sans JP', system-ui, sans-serif"
        font-size="46" font-weight="700" letter-spacing="3">A.R.G.U.S.</text>
  <text x="256" y="478" text-anchor="middle"
        fill="#8B98A7"
        font-family="Inter, 'Noto Sans JP', system-ui, sans-serif"
        font-size="11" font-weight="500" letter-spacing="2">Autonomous Risk and Global Uncertainty Scanner</text>
</svg>
